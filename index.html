<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TOUCH REFINED</title>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent-color: #ff3b30; --card-bg: #1c1c1e; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; overflow: hidden; -webkit-user-select: none; }
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }
        h1 { font-size: 4.5rem; font-weight: 900; letter-spacing: 0.2em; margin: 12vh 0 1rem 0.2em; }
        .btn { background: #2c2c2e; color: #fff; padding: 18px; font-size: 1rem; border-radius: 14px; margin: 8px; cursor: pointer; width: 85%; max-width: 320px; text-align: center; border: none; }
        .btn-red { background: var(--accent-color) !important; font-weight: bold; }
        .mini-btn { background: #333; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 10px; font-size: 0.75rem; flex: 1; text-align: center; }
        .nav-row { display: flex; width: 92%; justify-content: space-around; margin-top: auto; padding-bottom: calc(20px + env(safe-area-inset-bottom)); gap: 10px; }
        
        #viewer-area { width: 100vw; height: 100vw; max-height: 60vh; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #view-canvas, #video { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        
        #onion-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; pointer-events: none; display: none; }
        #guide-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        .line-h { position: absolute; width: 100%; height: 1px; background: rgba(0,255,255,0.4); }
        .line-v { position: absolute; height: 100%; width: 1px; background: rgba(0,255,255,0.4); }

        .shutter-row { display: flex; align-items: center; gap: 30px; margin: 20px 0; }
        #shutter { width: 70px; height: 70px; border-radius: 50%; background: #fff; border: 5px solid #333; box-shadow: 0 0 0 2px #fff; z-index: 10; }
        .mode-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .mode-tag { background: #444; padding: 6px 12px; border-radius: 20px; font-size: 0.65rem; color: #ccc; cursor: pointer; }
        .tag-active { background: var(--accent-color); color: #fff; }

        #lib-list { width: 92%; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px 0; }
        .lib-item { background: var(--card-bg); padding: 10px; border-radius: 14px; display: flex; align-items: center; gap: 10px; }
        .thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <h1>TOUCH</h1>
        <button class="btn btn-red" onclick="resetAndNav('camera')">CAPTURE</button>
        <button class="btn" onclick="document.getElementById('top-file-input').click()">IMPORT FILES</button>
        <input type="file" id="top-file-input" multiple accept="image/*" style="display:none" onchange="handleFileSelect(event)">
        <button class="btn" onclick="nav('library')">LIBRARY</button>
    </div>

    <div id="camera" class="screen">
        <div id="viewer-area">
            <video id="video" autoplay playsinline muted></video>
            <img id="onion-layer">
            <div id="guide-overlay"></div>
        </div>
        <div style="flex-grow:1; display:flex; flex-direction:column; align-items:center; width:100%; justify-content: center;">
            <div class="mode-row">
                <div id="tag-guide" class="mode-tag" onclick="toggleGuide()">GUIDE: OFF</div>
                <div id="tag-onion" class="mode-tag" onclick="toggleOnion()">ONION: OFF</div>
            </div>
            <div id="counter" style="color:#666; font-size:0.8rem; margin:8px 0;">0 FRAMES</div>
            <div class="shutter-row"><div id="shutter" onclick="captureFrame()"></div></div>
            <div class="nav-row">
                <button class="mini-btn" onclick="resetAndNav('home')">BACK (RESET)</button>
                <button class="mini-btn" onclick="retakeConfirm()">RETAKE</button>
                <button class="mini-btn btn-red" onclick="startViewer(true)">DONE</button>
            </div>
        </div>
    </div>

    <div id="viewer" class="screen">
        <div id="viewer-area" onpointerdown="onDown(event)" onpointermove="onMove(event)" onpointerup="onUp(event)">
            <canvas id="view-canvas"></canvas>
        </div>
        <div style="flex-grow:1; display:flex; flex-direction:column; align-items:center; width:100%; padding-top:10px;">
            <div style="width:90%; display:flex; gap:8px; margin-bottom:10px;">
                <div class="mini-btn" onclick="stepFrame(-1)">◀ STEP</div>
                <div id="frame-counter" style="flex:1; text-align:center; font-family:monospace; line-height:36px; font-size:0.9rem;">[ 0 / 0 ]</div>
                <div class="mini-btn" onclick="stepFrame(1)">STEP ▶</div>
            </div>

            <div id="preview-ui" style="width:90%; display:flex; flex-direction:column; gap:10px;">
                <div style="display:flex; gap:8px;"><div id="btn-loop" class="mini-btn" onclick="toggleLoopPlay()">LOOP: OFF</div><div class="mini-btn" style="background:#222;" onclick="setMode('edit')">EDIT (ALIGN)</div></div>
                <div style="display:flex; gap:8px;">
                    <div class="mini-btn" style="background:#2c2c2e;" onclick="resetAndNav('home')">HOME</div>
                    <div class="mini-btn" style="background:#2c2c2e;" onclick="nav('library')">GALLERY</div>
                    <div class="mini-btn" style="background:var(--accent-color); font-weight:bold;" onclick="exportToVideo()">🎬 MP4</div>
                </div>
            </div>

            <div id="edit-ui" style="width:90%; display:none; flex-direction:column; align-items:center; gap:10px;">
                <div style="display:flex; gap:8px; width:100%;">
                    <div class="mini-btn" onclick="resetOffset()">RESET POS</div>
                    <div class="mini-btn" style="background:#444;" onclick="setMode('preview')">FINISH EDIT</div>
                </div>
            </div>

            <div class="nav-row" id="save-controls">
                <button class="mini-btn" onclick="nav('camera')">ADD/RETAKE</button>
                <button class="mini-btn btn-red" onclick="saveToLibrary()">SAVE TO GALLERY</button>
            </div>
        </div>
    </div>

    <div id="library" class="screen">
        <div style="width:92%; margin-top:50px;"><h2>LIBRARY</h2></div>
        <div id="lib-list"></div>
        <div class="nav-row"><button class="btn" onclick="nav('home')" style="width:90%">HOME</button></div>
    </div>

    <canvas id="buffer" style="display:none;"></canvas>

    <script>
        let capturedImages = [], offsets = [], db, imageElements = [];
        let isDragging = false, isEditScreen = false, isAutoPlaying = false, isOnionEnabled = false;
        let currentPos = 0, lastX = 0, lastY = 0, velocity = 0, guideMode = 0; 

        const request = indexedDB.open("TouchAppDB", 1);
        request.onupgradeneeded = e => { e.target.result.createObjectStore("photos", { keyPath: "id", autoIncrement: true }); };
        request.onsuccess = e => { db = e.target.result; };

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            isAutoPlaying = false; velocity = 0;
            document.getElementById(id).classList.add('active');
            if(id === 'camera') initCamera(); else stopCamera();
            if(id === 'library') renderLibraryList();
        }

        function resetAndNav(id) {
            capturedImages = []; offsets = []; imageElements = [];
            currentPos = 0; velocity = 0;
            nav(id);
        }

        async function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;
            files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            capturedImages = []; offsets = [];
            for (let file of files) {
                const dataUrl = await new Promise(res => {
                    const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file);
                });
                capturedImages.push(dataUrl); offsets.push({x:0, y:0});
            }
            startViewer(true); event.target.value = "";
        }

        function toggleGuide() {
            guideMode = (guideMode + 1) % 3;
            const overlay = document.getElementById('guide-overlay');
            const tag = document.getElementById('tag-guide');
            overlay.innerHTML = "";
            tag.classList.remove('tag-active');
            if(guideMode === 0) { overlay.style.display = 'none'; tag.innerText = "GUIDE: OFF"; }
            else {
                overlay.style.display = 'block'; tag.classList.add('tag-active');
                if(guideMode === 1) {
                    tag.innerText = "GUIDE: 360°";
                    [25, 50, 75].forEach(t => { const l = document.createElement('div'); l.className = 'line-h'; l.style.top = t + "%"; overlay.appendChild(l); });
                } else {
                    tag.innerText = "GUIDE: OBJ";
                    [33, 66].forEach(p => {
                        const h = document.createElement('div'); h.className = 'line-h'; h.style.top = p + "%";
                        const v = document.createElement('div'); v.className = 'line-v'; v.style.left = p + "%";
                        overlay.appendChild(h); overlay.appendChild(v);
                    });
                }
            }
        }

        function toggleOnion() {
            isOnionEnabled = !isOnionEnabled;
            document.getElementById('tag-onion').classList.toggle('tag-active', isOnionEnabled);
            document.getElementById('tag-onion').innerText = isOnionEnabled ? "ONION: ON" : "ONION: OFF";
            updateOnionSkin();
        }

        async function initCamera() {
            document.getElementById('counter').innerText = `${capturedImages.length} FRAMES`;
            updateOnionSkin();
            const v = document.getElementById('video');
            if(v.srcObject && v.srcObject.active) return; 
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1000, height: 1000 } });
                v.srcObject = s;
            } catch (e) { console.log("Camera restart failed"); }
        }

        function stopCamera() {
            const v = document.getElementById('video');
            if(v && v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
        }

        function retakeConfirm() {
            if(confirm("撮影データをすべて削除してやり直しますか？")) {
                capturedImages = []; offsets = [];
                document.getElementById('counter').innerText = "0 FRAMES";
                updateOnionSkin();
                // 映像固定防止のため明示的にカメラの状態を確認
                const v = document.getElementById('video');
                if(!v.srcObject || !v.srcObject.active) initCamera();
            }
        }

        function captureFrame() {
            const v = document.getElementById('video');
            const canvas = document.getElementById('buffer');
            canvas.width = 800; canvas.height = 800;
            canvas.getContext('2d').drawImage(v, 0, 0, 800, 800);
            capturedImages.push(canvas.toDataURL('image/jpeg', 0.8));
            offsets.push({x:0, y:0});
            document.getElementById('counter').innerText = `${capturedImages.length} FRAMES`;
            updateOnionSkin();
        }

        function updateOnionSkin() {
            const o = document.getElementById('onion-layer');
            if(isOnionEnabled && capturedImages.length > 0) {
                o.src = capturedImages[capturedImages.length - 1]; o.style.display = 'block';
            } else { o.style.display = 'none'; }
        }

        async function startViewer(isNew) {
            if(capturedImages.length < 2) return;
            imageElements = await Promise.all(capturedImages.map(src => {
                return new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; });
            }));
            currentPos = 0; velocity = 0;
            setMode('preview');
            document.getElementById('save-controls').style.display = isNew ? 'flex' : 'none';
            nav('viewer');
            requestAnimationFrame(renderLoop);
        }

        function setMode(mode) {
            isEditScreen = (mode === 'edit');
            document.getElementById('preview-ui').style.display = isEditScreen ? 'none' : 'flex';
            document.getElementById('edit-ui').style.display = isEditScreen ? 'flex' : 'none';
            document.getElementById('save-controls').style.display = isEditScreen ? 'none' : (imageElements.length > 0 ? 'flex' : 'none');
            draw();
        }

        function draw() {
            const canvas = document.getElementById('view-canvas');
            if(!canvas || imageElements.length === 0) return;
            const ctx = canvas.getContext('2d');
            canvas.width = 800; canvas.height = 800;
            const total = imageElements.length;
            const idx = (Math.floor(currentPos) % total + total) % total;
            document.getElementById('frame-counter').innerText = `[ ${idx+1} / ${total} ]`;
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,800,800);
            if(isEditScreen) {
                const pIdx = (idx - 1 + total) % total;
                ctx.globalAlpha = 1.0;
                ctx.drawImage(imageElements[pIdx], offsets[pIdx].x, offsets[pIdx].y, 800, 800);
                ctx.globalAlpha = 0.5;
                ctx.drawImage(imageElements[idx], offsets[idx].x, offsets[idx].y, 800, 800);
            } else {
                ctx.globalAlpha = 1.0;
                ctx.drawImage(imageElements[idx], offsets[idx].x, offsets[idx].y, 800, 800);
            }
        }

        function onDown(e) { isDragging = true; lastX = e.clientX; lastY = e.clientY; velocity = 0; e.currentTarget.setPointerCapture(e.pointerId); }
        function onMove(e) {
            if(!isDragging) return;
            const dx = e.clientX - lastX; const dy = e.clientY - lastY;
            if(isEditScreen) {
                const total = imageElements.length;
                const idx = (Math.floor(currentPos) % total + total) % total;
                offsets[idx].x += dx * 2; offsets[idx].y += dy * 2;
            } else {
                velocity = dx / 15; currentPos -= velocity;
            }
            lastX = e.clientX; lastY = e.clientY; draw();
        }
        function onUp() { isDragging = false; }

        function renderLoop() {
            if(!document.getElementById('viewer').classList.contains('active')) return;
            if(isAutoPlaying && !isEditScreen) { currentPos += (imageElements.length / 180); draw(); } 
            else if(!isDragging && Math.abs(velocity) > 0.01) { velocity *= 0.95; currentPos -= velocity; draw(); }
            requestAnimationFrame(renderLoop);
        }

        function toggleLoopPlay() { isAutoPlaying = !isAutoPlaying; document.getElementById('btn-loop').classList.toggle('btn-red', isAutoPlaying); }
        function stepFrame(dir) { isAutoPlaying = false; velocity = 0; currentPos = Math.round(currentPos) + dir; draw(); }

        async function exportToVideo() {
            const canvas = document.getElementById('view-canvas');
            const stream = canvas.captureStream(30);
            let options = { mimeType: 'video/mp4' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm;codecs=h264' };
            const recorder = new MediaRecorder(stream, options);
            const chunks = [];
            isAutoPlaying = true; currentPos = 0;
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `TOUCH_${Date.now()}.mp4`; a.click();
                isAutoPlaying = false;
            };
            recorder.start();
            setTimeout(() => { recorder.stop(); }, 4000); 
        }

        function saveToLibrary() {
            const t = prompt("Save as...", new Date().toLocaleString()); if(!t) return;
            const tx = db.transaction(["photos"], "readwrite");
            tx.objectStore("photos").add({ title: t, data: capturedImages, offsets, thumb: capturedImages[0], timestamp: Date.now() }).onsuccess = () => nav('home');
        }

        function renderLibraryList() {
            const list = document.getElementById('lib-list'); list.innerHTML = "";
            db.transaction(["photos"], "readonly").objectStore("photos").openCursor(null, 'prev').onsuccess = e => {
                const c = e.target.result;
                if(c) {
                    const i = c.value;
                    const div = document.createElement('div'); div.className = 'lib-item';
                    div.innerHTML = `<img src="${i.thumb}" class="thumb"><div style="flex:1"><b>${i.title}</b></div>
                        <button class="mini-btn" onclick="viewItem(${i.id})">VIEW</button>
                        <button class="mini-btn" style="color:#666;" onclick="deleteItem(${i.id})">DEL</button>`;
                    list.appendChild(div); c.continue();
                }
            };
        }

        window.viewItem = id => { db.transaction(["photos"], "readonly").objectStore("photos").get(id).onsuccess = e => { 
            const i = e.target.result; capturedImages = i.data; offsets = i.offsets; startViewer(false); 
        }; };
        window.deleteItem = id => { if(confirm("削除しますか？")) db.transaction(["photos"], "readwrite").objectStore("photos").delete(id).onsuccess = () => renderLibraryList(); };
        function resetOffset() { const total = imageElements.length; const idx = (Math.floor(currentPos) % total + total) % total; offsets[idx] = {x:0, y:0}; draw(); }
    </script>
</body>
</html>
