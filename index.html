<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TOUCH - Phase 1 Stable</title>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent-color: #e63928; --btn-gray: #b3b3b3; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: sans-serif; overflow: hidden; -webkit-user-select: none; }
        
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; box-sizing: border-box; }
        .screen.active { display: flex; }

        /* HOME */
        #home h1 { font-size: 3.5rem; margin-top: 15vh; margin-bottom: 8vh; letter-spacing: 0.1em; }
        .home-btn { width: 80%; max-width: 400px; padding: 15px; margin: 8px 0; font-size: 1.2rem; border: none; cursor: pointer; font-weight: bold; }
        .btn-capture { background: var(--accent-color); color: #fff; }
        .btn-gray { background: var(--btn-gray); color: #fff; }

        /* CAPTURE */
        #viewer-area { width: 100vw; height: 75vw; border-top: 2px solid #fff; border-bottom: 2px solid #fff; margin-top: 10px; position: relative; overflow: hidden; background: #222; }
        #video, #onion-layer { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        #guide-overlay { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #shutter-curtain { position: absolute; width: 100%; height: 100%; background: #000; opacity: 0; pointer-events: none; z-index: 20; }
        .flash { animation: flash-effect 0.15s ease-out; }
        @keyframes flash-effect { 0% { opacity: 0.9; } 100% { opacity: 0; } }

        .ui-row { display: flex; width: 90vw; justify-content: space-between; margin-top: 12px; gap: 10px; }
        .control-btn { border: 2px solid #fff; background: rgba(0,0,0,0.5); color: #fff; padding: 8px 0; flex: 1; font-size: 0.8rem; cursor: pointer; }
        .counter-box { flex: 1; text-align: center; line-height: 2.2; font-size: 1rem; font-weight: bold; }
        
        #shutter { width: 85px; height: 85px; border-radius: 50%; background: var(--accent-color); border: 4px solid #000; outline: 3px solid #fff; margin: 15px 0; cursor: pointer; }
        #shutter.timer-active { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(230, 57, 40, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(230, 57, 40, 0); } }

        .nav-row { display: flex; width: 95vw; justify-content: space-between; margin-top: auto; padding-bottom: 25px; }
        .nav-btn { border: 2px solid #fff; background: none; color: #fff; width: 31%; padding: 12px 0; font-size: 0.8rem; cursor: pointer; font-weight: bold; }

        .line-h { position: absolute; width: 100%; height: 1px; background: rgba(255,255,255,0.6); }
        .line-v { position: absolute; height: 100%; width: 1px; background: rgba(255,255,255,0.6); }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <h1>TOUCH</h1>
        <button class="home-btn btn-capture" onclick="navToCamera()">CAPTURE</button>
        <button class="home-btn btn-gray" onclick="document.getElementById('top-file-input').click()">IMPORT IMAGES</button>
        <input type="file" id="top-file-input" multiple accept="image/*" style="display:none" onchange="handleFileSelect(event)">
        <button class="home-btn btn-gray" onclick="nav('library')">LIBRARY</button>
    </div>

    <div id="camera" class="screen">
        <div id="viewer-area">
            <video id="video" autoplay playsinline muted></video>
            <img id="onion-layer" style="display:none; opacity: 0.4;">
            <div id="shutter-curtain"></div>
            <div id="guide-overlay"></div>
        </div>

        <div class="ui-row">
            <button id="btn-guide" class="control-btn" onclick="toggleGuide()">GUIDE : off</button>
            <div id="counter" class="counter-box">[ 0 / 0 ]</div>
            <button id="btn-onion" class="control-btn" onclick="toggleOnion()">ONION : off</button>
        </div>

        <div class="ui-row" style="justify-content: flex-start;">
            <button id="btn-timer" class="control-btn" style="max-width: 130px;" onclick="toggleTimer()">TIMER : off</button>
        </div>

        <div id="shutter" onclick="onShutterClick()"></div>

        <div class="ui-row" style="justify-content: flex-start;">
            <button class="control-btn" style="max-width: 100px; border-color: #666; color: #666;" onclick="cancelLastFrame()">CANCEL</button>
        </div>

        <div class="nav-row">
            <button class="nav-btn" onclick="exitCamera()">HOME</button>
            <button class="nav-btn" onclick="retakeAll()">RETAKE ALL</button>
            <button class="nav-btn" onclick="goPlayCheck()">PLAY CHECK</button>
        </div>
    </div>

    <canvas id="buffer" style="display:none;"></canvas>

    <script>
        let capturedImages = [], offsets = [], comments = [];
        let guideMode = 0, isOnion = false, timerInterval = null;
        let stream = null;

        // 画面遷移の基本
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // カメラ画面へ行く
        async function navToCamera() {
            nav('camera');
            await startCamera();
        }

        // カメラ画面から出る
        function exitCamera() {
            if (capturedImages.length > 0 && !confirm("データを破棄して戻りますか？")) return;
            stopTimer();
            stopCamera();
            capturedImages = []; offsets = []; comments = [];
            updateUI();
            nav('home');
        }

        // カメラ起動ロジック
        async function startCamera() {
            const v = document.getElementById('video');
            if (stream && stream.active) return; // 既に動いていれば何もしない

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                v.srcObject = stream;
                // 明示的にplayを呼ぶ（iOS対策）
                await v.play();
                console.log("Camera started");
            } catch (e) {
                alert("カメラの起動に失敗しました。設定を確認してください。");
            }
        }

        // カメラ停止ロジック
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            const v = document.getElementById('video');
            v.srcObject = null;
        }

        // 撮影
        function captureFrame() {
            const v = document.getElementById('video');
            const b = document.getElementById('buffer');
            
            // シャッター演出
            const curtain = document.getElementById('shutter-curtain');
            curtain.classList.remove('flash');
            void curtain.offsetWidth; // リフロー
            curtain.classList.add('flash');

            // 映像が有効かチェック
            if (v.videoWidth === 0) return;

            b.width = v.videoWidth; b.height = v.videoHeight;
            b.getContext('2d').drawImage(v, 0, 0);
            
            const data = b.toDataURL('image/jpeg', 0.8);
            capturedImages.push(data);
            offsets.push({ x: 0, y: 0 });
            comments.push([]);
            
            updateUI();
        }

        function onShutterClick() {
            if (timerInterval) stopTimer(); else captureFrame();
        }

        function toggleTimer() {
            if (timerInterval) { stopTimer(); return; }
            const sec = prompt("撮影間隔（秒）", "2");
            if (sec && !isNaN(sec) && sec > 0) {
                timerInterval = setInterval(captureFrame, sec * 1000);
                document.getElementById('btn-timer').innerText = `TIMER : ${sec}s`;
                document.getElementById('shutter').classList.add('timer-active');
            }
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('btn-timer').innerText = `TIMER : off`;
                document.getElementById('shutter').classList.remove('timer-active');
            }
        }

        function cancelLastFrame() {
            if (capturedImages.length > 0) {
                capturedImages.pop(); offsets.pop(); comments.pop();
                updateUI();
            }
        }

        // RETAKE ALL: 映像はそのまま、中身だけ消す
        function retakeAll() {
            if (confirm("全ての画像を削除しますか？（カメラは継続します）")) {
                capturedImages = []; offsets = []; comments = [];
                updateUI();
            }
        }

        function updateUI() {
            const count = capturedImages.length;
            document.getElementById('counter').innerText = `[ ${count} / ${count} ]`;
            const onion = document.getElementById('onion-layer');
            if (isOnion && count > 0) {
                onion.src = capturedImages[count - 1];
                onion.style.display = 'block';
            } else { onion.style.display = 'none'; }
        }

        function toggleOnion() {
            isOnion = !isOnion;
            document.getElementById('btn-onion').innerText = `ONION : ${isOnion ? 'on' : 'off'}`;
            updateUI();
        }

        function toggleGuide() {
            guideMode = (guideMode + 1) % 3;
            const g = document.getElementById('guide-overlay');
            const b = document.getElementById('btn-guide');
            g.innerHTML = "";
            if (guideMode === 0) b.innerText = "GUIDE : off";
            else if (guideMode === 1) {
                b.innerText = "GUIDE : 360";
                [25, 50, 75].forEach(p => g.innerHTML += `<div class="line-h" style="top:${p}%"></div>`);
            } else {
                b.innerText = "GUIDE : OBJ";
                [33, 66].forEach(p => { 
                    g.innerHTML += `<div class="line-h" style="top:${p}%"></div><div class="line-v" style="left:${p}%"></div>`); 
                });
            }
        }

        async function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            capturedImages = []; offsets = []; comments = [];
            for (const file of files) {
                const data = await new Promise(res => {
                    const r = new FileReader(); r.onload = x => res(x.target.result); r.readAsDataURL(file);
                });
                capturedImages.push(data); offsets.push({ x: 0, y: 0 }); comments.push([]);
            }
            alert(`${capturedImages.length}枚を読み込みました。`);
        }

        function goPlayCheck() {
            if (capturedImages.length === 0) return alert("撮影データがありません。");
            alert("Phase 2：PLAY CHECKモードへ進みます。");
        }
    </script>
</body>
</html>
