<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TOUCH</title>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent-color: #ff3b30; --card-bg: #1c1c1e; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; overflow: hidden; -webkit-user-select: none; user-select: none; }
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }
        h1 { font-size: 4.5rem; font-weight: 900; letter-spacing: 0.2em; margin: 15vh 0 2rem 0.2em; }
        
        .btn { background: #2c2c2e; color: #fff; border: 1px solid #3a3a3c; padding: 18px; font-size: 1rem; border-radius: 14px; margin: 8px; cursor: pointer; width: 85%; max-width: 320px; text-align: center; border: none; }
        .btn-accent { background: var(--accent-color); font-weight: bold; }
        
        #camera-container, #viewer-area { width: 100vw; height: 60vh; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video, .viewer-layer { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        #onion-layer { opacity: 0.5; z-index: 5; display: none; pointer-events: none; }
        #current-layer { z-index: 10; touch-action: none; }

        .controls { width: 100%; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; background: #000; padding-top: 10px; z-index: 20; }
        #shutter { width: 70px; height: 70px; border-radius: 50%; background: #fff; border: 5px solid #333; margin-bottom: 10px; }
        
        .adjust-row { display: flex; width: 90%; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .mini-btn { background: #333; color: #fff; border: 1px solid #444; padding: 10px 12px; border-radius: 10px; font-size: 0.7rem; min-width: 60px; }
        .active-mode { background: var(--accent-color) !important; border: none; font-weight: bold; }

        .nav-row { display: flex; width: 92%; justify-content: space-around; margin-top: auto; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .nav-row .btn { width: 45%; margin: 0; padding: 12px; font-size: 0.8rem; }

        /* Library Layout */
        .lib-header { width: 92%; display: flex; justify-content: space-between; align-items: center; margin-top: 50px; }
        #lib-list { width: 92%; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px 0; }
        .lib-item { background: var(--card-bg); padding: 12px; border-radius: 18px; display: flex; align-items: center; border: 1px solid #2c2c2e; }
        
        .thumb-wrap { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
        .thumb { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; background: #333; }
        .badge { position: absolute; bottom: -4px; right: -4px; background: var(--accent-color); color: white; font-size: 0.6rem; font-weight: bold; padding: 2px 5px; border-radius: 8px; border: 2px solid var(--card-bg); }

        .item-info { flex: 1; margin-left: 15px; overflow: hidden; }
        .title-row { display: flex; align-items: center; gap: 6px; }
        .item-title { font-weight: bold; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-date { color: #666; font-size: 0.75rem; margin-top: 3px; }
        .mode-icon { font-size: 0.8rem; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <h1>TOUCH</h1>
        <button class="btn btn-accent" onclick="requestSensorAndNav()">CAPTURE</button>
        <button class="btn" onclick="openLibrary()">LIBRARY</button>
    </div>

    <div id="camera" class="screen">
        <div id="camera-container"><video id="video" autoplay playsinline muted></video></div>
        <div class="controls">
            <div id="counter" style="color:#666; font-size:0.7rem; margin-bottom:10px;">0 FRAMES</div>
            <div id="shutter" onclick="captureFrame()"></div>
            <div class="nav-row">
                <button class="btn" onclick="nav('home')">CANCEL</button>
                <button class="btn btn-accent" onclick="startViewer(true)">DONE</button>
            </div>
        </div>
        <canvas id="buffer" style="display:none;"></canvas>
    </div>

    <div id="viewer" class="screen">
        <div id="viewer-area">
            <img id="onion-layer" class="viewer-layer">
            <img id="current-layer" class="viewer-layer">
        </div>
        <div class="controls">
            <div id="edit-hint" style="color:var(--accent-color); font-size:0.7rem; margin-bottom:8px; display:none; font-weight:bold;">EDIT: ドラッグで重ね合わせ</div>
            <div class="adjust-row">
                <button class="mini-btn" onclick="stepFrame(-1)">◀</button>
                <button id="play-btn" class="mini-btn" onclick="togglePlay()">PLAY</button>
                <button id="edit-btn" class="mini-btn" onclick="toggleEditMode()">EDIT</button>
                <button class="mini-btn" onclick="stepFrame(1)">▶</button>
            </div>
            <div class="nav-row" id="preview-controls">
                <button class="btn" onclick="nav('camera')">RETAKE</button>
                <button class="btn btn-accent" onclick="saveToLibrary()">SAVE</button>
            </div>
            <div class="nav-row" id="library-controls" style="display:none;">
                <button class="btn" onclick="nav('home')">HOME</button>
                <button class="btn btn-accent" onclick="openLibrary()">BACK</button>
            </div>
        </div>
    </div>

    <div id="library" class="screen">
        <div class="lib-header">
            <h2 style="margin:0;">LIBRARY</h2>
            <div style="display:flex; gap:5px;">
                <button class="mini-btn" style="min-width:50px; padding:6px;" onclick="openLibrary('date')">📅</button>
                <button class="mini-btn" style="min-width:50px; padding:6px;" onclick="openLibrary('name')">ABC</button>
            </div>
        </div>
        <div id="lib-list"></div>
        <div class="nav-row"><button class="btn" onclick="nav('home')" style="width:90%">HOME</button></div>
    </div>

    <script>
        let capturedImages = [], offsets = [], currentMode = 'obj';
        let isDragging = false, isEditMode = false, isAutoSpinning = false;
        let lastX = 0, lastY = 0, velocity = 0, currentPos = 0;
        let db;

        const request = indexedDB.open("TouchAppDB", 1);
        request.onupgradeneeded = e => { e.target.result.createObjectStore("photos", { keyPath: "id", autoIncrement: true }); };
        request.onsuccess = e => { db = e.target.result; };

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'camera') initCamera(); else stopCamera();
            isAutoSpinning = false; isEditMode = false; velocity = 0;
        }

        async function initCamera() {
            capturedImages = []; offsets = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280, height: 1280 } });
                document.getElementById('video').srcObject = stream;
            } catch (e) { alert("Camera Error"); }
        }

        function stopCamera() {
            const video = document.getElementById('video');
            if(video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
        }

        function captureFrame() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('buffer');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImages.push(canvas.toDataURL('image/jpeg', 0.6));
            offsets.push({x: 0, y: 0});
            document.getElementById('counter').innerText = `${capturedImages.length} FRAMES`;
        }

        function startViewer(isPreview) {
            if(capturedImages.length < 2) return;
            if(offsets.length === 0) offsets = capturedImages.map(() => ({x:0, y:0}));
            currentPos = 0; isEditMode = false;
            // 簡易判定：枚数が多ければ360モード
            currentMode = capturedImages.length > 40 ? '360' : 'obj';
            updateImage();
            document.getElementById('preview-controls').style.display = isPreview ? 'flex' : 'none';
            document.getElementById('library-controls').style.display = isPreview ? 'none' : 'flex';
            document.getElementById('edit-btn').classList.remove('active-mode');
            nav('viewer');
            renderLoop();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            isAutoSpinning = false;
            document.getElementById('play-btn').innerText = "PLAY";
            document.getElementById('edit-btn').classList.toggle('active-mode', isEditMode);
            document.getElementById('edit-hint').style.display = isEditMode ? 'block' : 'none';
            document.getElementById('onion-layer').style.display = isEditMode ? 'block' : 'none';
            updateImage();
        }

        function updateImage() {
            const total = capturedImages.length;
            if(total === 0) return;
            const idx = (Math.floor(currentPos) % total + total) % total;
            const prevIdx = (idx - 1 + total) % total;

            const currentLayer = document.getElementById('current-layer');
            const onionLayer = document.getElementById('onion-layer');

            currentLayer.src = capturedImages[idx];
            currentLayer.style.transform = `translate(${offsets[idx].x}px, ${offsets[idx].y}px)`;

            if (isEditMode) {
                onionLayer.src = capturedImages[prevIdx];
                onionLayer.style.transform = `translate(${offsets[prevIdx].x}px, ${offsets[prevIdx].y}px)`;
            }
        }

        function togglePlay() {
            isAutoSpinning = !isAutoSpinning;
            if(isAutoSpinning) { 
                isEditMode = false; 
                document.getElementById('edit-btn').classList.remove('active-mode'); 
                document.getElementById('onion-layer').style.display = 'none'; 
                document.getElementById('edit-hint').style.display = 'none'; 
            }
            document.getElementById('play-btn').innerText = isAutoSpinning ? "STOP" : "PLAY";
        }

        function stepFrame(dir) {
            isAutoSpinning = false;
            document.getElementById('play-btn').innerText = "PLAY";
            currentPos = Math.round(currentPos) + dir;
            updateImage();
        }

        const vArea = document.getElementById('viewer-area');
        vArea.addEventListener('pointerdown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; velocity = 0; vArea.setPointerCapture(e.pointerId); });
        
        vArea.addEventListener('pointermove', e => {
            if(!isDragging) return;
            const idx = (Math.floor(currentPos) % capturedImages.length + capturedImages.length) % capturedImages.length;
            
            if (isEditMode) {
                offsets[idx].x += (e.clientX - lastX);
                offsets[idx].y += (e.clientY - lastY);
                updateImage();
            } else {
                velocity = ((e.clientX - lastX) / window.innerWidth) * (capturedImages.length * 0.8);
                currentPos += velocity;
                updateImage();
            }
            lastX = e.clientX; lastY = e.clientY;
        });
        vArea.addEventListener('pointerup', () => isDragging = false);

        function renderLoop() {
            if(!document.getElementById('viewer').classList.contains('active')) return;
            if(isAutoSpinning) { currentPos += 0.12; updateImage(); }
            else if(!isDragging && Math.abs(velocity) > 0.01) {
                velocity *= 0.95; currentPos += velocity; updateImage();
            }
            requestAnimationFrame(renderLoop);
        }

        async function requestSensorAndNav() { nav('camera'); }

        function saveToLibrary() {
            const title = prompt("作品名", new Date().toLocaleString());
            if(!title) return;
            const transaction = db.transaction(["photos"], "readwrite");
            transaction.objectStore("photos").add({ 
                title, data: capturedImages, offsets, thumb: capturedImages[0], 
                timestamp: Date.now(), count: capturedImages.length, mode: currentMode 
            });
            transaction.oncomplete = () => { alert("Saved!"); nav('home'); };
        }

        function openLibrary(sortBy = 'date') {
            const list = document.getElementById('lib-list'); list.innerHTML = "";
            const transaction = db.transaction(["photos"], "readonly");
            let items = [];
            transaction.objectStore("photos").openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) { items.push(cursor.value); cursor.continue(); }
                else {
                    if(sortBy === 'name') items.sort((a,b) => a.title.localeCompare(b.title));
                    else items.sort((a,b) => b.timestamp - a.timestamp);
                    
                    items.forEach(item => {
                        const div = document.createElement('div'); div.className = 'lib-item';
                        const icon = item.mode === '360' ? '🌐' : '📦';
                        div.innerHTML = `
                            <div class="thumb-wrap">
                                <img src="${item.thumb}" class="thumb">
                                <div class="badge">${item.count}</div>
                            </div>
                            <div class="item-info">
                                <div class="title-row">
                                    <span class="mode-icon">${icon}</span>
                                    <span class="item-title">${item.title}</span>
                                </div>
                                <div class="item-date">${new Date(item.timestamp).toLocaleDateString()}</div>
                            </div>
                            <div style="display:flex; gap:8px;">
                                <button class="mini-btn" style="min-width:40px; background:#444;" onclick="viewItem(${item.id})">▶</button>
                                <button class="mini-btn" style="min-width:40px; color:#666; background:#222;" onclick="deleteItem(${item.id})">🗑</button>
                            </div>`;
                        list.appendChild(div);
                    });
                }
            };
            nav('library');
        }

        window.viewItem = id => {
            const transaction = db.transaction(["photos"], "readonly");
            transaction.objectStore("photos").get(id).onsuccess = e => {
                const item = e.target.result;
                capturedImages = item.data; 
                offsets = item.offsets || item.data.map(()=>({x:0,y:0}));
                currentMode = item.mode || 'obj';
                startViewer(false);
            };
        };

        window.deleteItem = id => { if(confirm("削除しますか？")) { const transaction = db.transaction(["photos"], "readwrite"); transaction.objectStore("photos").delete(id).onsuccess = () => openLibrary(); } };
    </script>
</body>
</html>
