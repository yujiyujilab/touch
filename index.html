<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TOUCH</title>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent-color: #ff3b30; --card-bg: #1c1c1e; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; overflow: hidden; -webkit-user-select: none; user-select: none; }
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; }
        .screen.active { display: flex; }
        h1 { font-size: 4.5rem; font-weight: 900; letter-spacing: 0.2em; margin: 0 0 2rem 0.2em; }
        
        .btn { background: #2c2c2e; color: #fff; border: 1px solid #3a3a3c; padding: 18px; font-size: 1rem; border-radius: 14px; margin: 8px; cursor: pointer; width: 85%; max-width: 320px; text-align: center; border: none; }
        .btn-accent { background: var(--accent-color); font-weight: bold; }
        
        #camera-container { width: 100%; height: 65%; background: #000; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #viewer-area { width: 100%; height: 65%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; touch-action: none; overflow: hidden; }
        #viewer-img { max-width: 100%; max-height: 100%; pointer-events: none; }
        
        /* トラッキング用ターゲット */
        #track-target { position: absolute; width: 40px; height: 40px; border: 2px solid var(--accent-color); border-radius: 50%; display: none; pointer-events: none; z-index: 100; }
        #track-target::after, #track-target::before { content: ''; position: absolute; background: var(--accent-color); }
        #track-target::after { width: 100%; height: 1px; top: 50%; left: 0; }
        #track-target::before { width: 1px; height: 100%; left: 50%; top: 0; }

        .controls { width: 100%; height: 35%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; background: #000; padding-top: 15px; z-index: 10; }
        #shutter { width: 75px; height: 75px; border-radius: 50%; background: #fff; border: 6px solid #333; margin-bottom: 15px; }
        .nav-row { display: flex; width: 92%; justify-content: space-around; margin-top: auto; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .nav-row .btn { width: 45%; margin: 0; padding: 14px; font-size: 0.9rem; }

        #lib-list { width: 92%; height: 50%; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .lib-item { background: var(--card-bg); padding: 10px; border-radius: 16px; display: flex; align-items: center; border: 1px solid #333; }
        .thumb { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; color: white; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loading"><div style="margin-bottom:15px; font-weight:bold;">Tracking Point...</div><div id="load-progress">0%</div></div>

    <div id="home" class="screen active">
        <h1>TOUCH</h1>
        <button class="btn btn-accent" onclick="requestSensorAndNav()">CAPTURE</button>
        <button class="btn" onclick="openLibrary()">LIBRARY</button>
    </div>

    <div id="camera" class="screen">
        <div id="camera-container"><video id="video" autoplay playsinline muted></video></div>
        <div class="controls">
            <div id="counter" style="color:#666; font-size:0.75rem; margin-bottom:10px;">0 FRAMES</div>
            <div id="shutter" onclick="captureFrame()"></div>
            <div class="nav-row">
                <button class="btn" onclick="nav('home')">CANCEL</button>
                <button class="btn btn-accent" onclick="startViewer(true)">DONE</button>
            </div>
        </div>
        <canvas id="buffer" style="display:none;"></canvas>
    </div>

    <div id="viewer" class="screen">
        <div id="viewer-area">
            <img id="viewer-img">
            <div id="track-target"></div>
        </div>
        <div class="controls">
            <p id="viewer-hint" style="color:#aaa; font-size:0.7rem; margin:0 0 10px 0;">背景の動かない箇所をタップして固定</p>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button id="undo-btn" class="btn" onclick="resetAlign()" style="width:100px; padding:10px; font-size:0.8rem; background:#444; display:none;">↺ RESET</button>
                <button class="btn" onclick="runAutoSpin()" style="width:100px; padding:10px; font-size:0.8rem; background:#222;">▶ PLAY</button>
            </div>
            <div class="nav-row" id="preview-controls">
                <button class="btn" onclick="nav('camera')">RETAKE</button>
                <button class="btn btn-accent" onclick="saveToLibrary()">SAVE</button>
            </div>
            <div class="nav-row" id="library-controls" style="display:none;">
                <button class="btn" onclick="nav('home')">HOME</button>
                <button class="btn btn-accent" onclick="openLibrary()">BACK</button>
            </div>
        </div>
    </div>

    <div id="library" class="screen">
        <h2 style="margin-top:60px;">LIBRARY</h2>
        <div id="lib-list"></div>
        <button class="btn" onclick="nav('home')" style="margin-top:25px;">HOME</button>
    </div>

    <script>
        let capturedImages = [], offsets = [], currentMode = 'obj';
        let isDragging = false, lastX = 0, velocity = 0, currentPos = 0, isAutoSpinning = false;
        let startAngle = null, currentAngle = 0, maxDiffAngle = 0;
        const friction = 0.92, dragDamping = 0.4;
        let db;

        const request = indexedDB.open("TouchAppDB", 1);
        request.onupgradeneeded = e => { e.target.result.createObjectStore("photos", { keyPath: "id", autoIncrement: true }); };
        request.onsuccess = e => { db = e.target.result; };

        async function requestSensorAndNav() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
            }
            window.addEventListener('deviceorientation', e => {
                if (e.alpha !== null) {
                    currentAngle = e.alpha;
                    if (capturedImages.length > 0) {
                        if (startAngle === null) startAngle = currentAngle;
                        let diff = Math.abs(currentAngle - startAngle);
                        if (diff > 180) diff = 360 - diff;
                        if (diff > maxDiffAngle) maxDiffAngle = diff;
                    }
                }
            });
            nav('camera');
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'camera') initCamera(); else stopCamera();
            isAutoSpinning = false;
        }

        async function initCamera() {
            capturedImages = []; offsets = [];
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280, height: 1280 } });
                video.srcObject = stream;
            } catch (e) { alert("Camera Error"); }
        }

        function stopCamera() {
            const video = document.getElementById('video');
            if(video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
        }

        function captureFrame() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('buffer');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImages.push(canvas.toDataURL('image/jpeg', 0.5));
            offsets.push({x: 0, y: 0});
            document.getElementById('counter').innerText = `${capturedImages.length} FRAMES`;
        }

        function startViewer(isPreview) {
            if(capturedImages.length < 2) return;
            if(offsets.length === 0) offsets = capturedImages.map(() => ({x:0, y:0}));
            currentMode = maxDiffAngle > 100 ? '360' : 'obj';
            updateImage();
            document.getElementById('preview-controls').style.display = isPreview ? 'flex' : 'none';
            document.getElementById('library-controls').style.display = isPreview ? 'none' : 'flex';
            document.getElementById('track-target').style.display = isPreview ? 'none' : 'none';
            nav('viewer');
            if(isPreview) runAutoSpin(); else renderViewer();
        }

        // --- ポイントトラッキング (テンプレートマッチング) ---
        const vArea = document.getElementById('viewer-area');
        vArea.onclick = async (e) => {
            if (isAutoSpinning || document.getElementById('library-controls').style.display === 'flex') return;
            
            const rect = vArea.getBoundingClientRect();
            const tapX = e.clientX - rect.left;
            const tapY = e.clientY - rect.top;
            
            // ターゲット表示
            const target = document.getElementById('track-target');
            target.style.left = `${tapX - 20}px`;
            target.style.top = `${tapY - 20}px`;
            target.style.display = 'block';

            if(confirm("この地点を基準に全フレームを固定しますか？")) {
                await runPointTracking(tapX / rect.width, tapY / rect.height);
            } else {
                target.style.display = 'none';
            }
        };

        async function runPointTracking(normX, normY) {
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';
            const canvas = document.getElementById('buffer');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            // 1. テンプレート(32x32)を1枚目から抽出
            const img0 = await loadImage(capturedImages[0]);
            const fullW = img0.width, fullH = img0.height;
            const tx = normX * fullW, ty = normY * fullH;
            const tSize = 32; // テンプレートサイズ
            const sSize = 120; // 探索範囲

            canvas.width = tSize; canvas.height = tSize;
            ctx.drawImage(img0, tx - tSize/2, ty - tSize/2, tSize, tSize, 0, 0, tSize, tSize);
            const template = ctx.getImageData(0, 0, tSize, tSize).data;

            // 2. 各フレームで探索
            for (let i = 0; i < capturedImages.length; i++) {
                document.getElementById('load-progress').innerText = `${Math.round((i/capturedImages.length)*100)}%`;
                const img = await loadImage(capturedImages[i]);
                canvas.width = sSize; canvas.height = sSize;
                ctx.drawImage(img, tx - sSize/2, ty - sSize/2, sSize, sSize, 0, 0, sSize, sSize);
                const searchArea = ctx.getImageData(0, 0, sSize, sSize).data;

                let bestX = 0, bestY = 0, minDiff = Infinity;
                // 探索範囲内をスキャン
                for (let sy = 0; sy < sSize - tSize; sy += 2) {
                    for (let sx = 0; sx < sSize - tSize; sx += 2) {
                        let diff = 0;
                        // テンプレートとの差分(SSD)を計算
                        for (let py = 0; py < tSize; py += 4) {
                            for (let px = 0; px < tSize; px += 4) {
                                const sIdx = ((sy + py) * sSize + (sx + px)) * 4;
                                const tIdx = (py * tSize + px) * 4;
                                diff += Math.abs(searchArea[sIdx] - template[tIdx]);
                            }
                        }
                        if (diff < minDiff) { minDiff = diff; bestX = sx; bestY = sy; }
                    }
                }
                
                // 座標のズレを計算してオフセット保存
                let offX = (sSize/2 - tSize/2) - bestX;
                let offY = (sSize/2 - tSize/2) - bestY;
                
                // ループ吸着処理
                if (i > capturedImages.length * 0.85) {
                    const ratio = (i - capturedImages.length * 0.85) / (capturedImages.length * 0.15);
                    offX *= (1 - ratio); offY *= (1 - ratio);
                }
                offsets[i] = {x: offX, y: offY};
                if(i % 5 === 0) await new Promise(r => setTimeout(r, 1));
            }

            loading.style.display = 'none';
            document.getElementById('undo-btn').style.display = 'block';
            updateImage();
        }

        function resetAlign() {
            offsets = capturedImages.map(() => ({x: 0, y: 0}));
            document.getElementById('undo-btn').style.display = 'none';
            document.getElementById('track-target').style.display = 'none';
            updateImage();
        }

        function loadImage(src) { return new Promise(resolve => { const img = new Image(); img.onload = () => resolve(img); img.src = src; }); }

        function updateImage() {
            const total = capturedImages.length;
            if(total > 0) {
                const idx = (Math.floor(currentPos) % total + total) % total;
                const imgEl = document.getElementById('viewer-img');
                imgEl.src = capturedImages[idx];
                const off = offsets[idx] || {x:0, y:0};
                imgEl.style.transform = `translate(${off.x}px, ${off.y}px)`;
            }
        }

        function runAutoSpin() {
            if(isAutoSpinning) return;
            isAutoSpinning = true;
            let start = null, duration = 2000;
            function animate(time) {
                if(!start) start = time;
                let progress = (time - start) / duration;
                if (progress < 1 && isAutoSpinning) {
                    currentPos = progress * (capturedImages.length * 2);
                    updateImage(); requestAnimationFrame(animate);
                } else { isAutoSpinning = false; renderViewer(); }
            }
            requestAnimationFrame(animate);
        }

        function saveToLibrary() {
            const now = new Date();
            const title = prompt("保存名", now.toLocaleString());
            if(!title) return;
            const transaction = db.transaction(["photos"], "readwrite");
            transaction.objectStore("photos").add({ 
                title, data: capturedImages, offsets: offsets, thumb: capturedImages[0], 
                timestamp: now.getTime(), dateLabel: now.toLocaleString(), mode: currentMode, count: capturedImages.length
            });
            transaction.oncomplete = () => { alert("保存しました"); nav('home'); };
        }

        function openLibrary() {
            const list = document.getElementById('lib-list'); list.innerHTML = "";
            const transaction = db.transaction(["photos"], "readonly");
            transaction.objectStore("photos").openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) {
                    const item = cursor.value;
                    const div = document.createElement('div'); div.className = 'lib-item';
                    div.innerHTML = `<img src="${item.thumb}" class="thumb"><div style="flex:1;margin-left:10px;"><b style="font-size:0.9rem;">${item.title}</b><br><small style="color:#666;">${item.count} frames</small></div><div class="icon-btn" onclick="viewItem(${item.id})">▶</div><div class="icon-btn" onclick="deleteItem(${item.id})">🗑</div>`;
                    list.appendChild(div);
                    cursor.continue();
                }
            };
            nav('library');
        }

        window.viewItem = (id) => {
            const transaction = db.transaction(["photos"], "readonly");
            transaction.objectStore("photos").get(id).onsuccess = e => {
                capturedImages = e.target.result.data;
                offsets = e.target.result.offsets || capturedImages.map(() => ({x:0, y:0}));
                currentMode = e.target.result.mode || 'obj';
                startViewer(false);
            };
        };

        window.deleteItem = (id) => {
            if(confirm("削除しますか？")) {
                const transaction = db.transaction(["photos"], "readwrite");
                transaction.objectStore("photos").delete(id).onsuccess = () => openLibrary();
            }
        };

        vArea.addEventListener('pointerdown', e => { if(isAutoSpinning) return; isDragging = true; lastX = e.clientX; velocity = 0; vArea.setPointerCapture(e.pointerId); });
        vArea.addEventListener('pointermove', e => {
            if(!isDragging || isAutoSpinning) return;
            velocity += ((e.clientX - lastX) / window.innerWidth) * (capturedImages.length * 1.5);
            lastX = e.clientX;
        });
        vArea.addEventListener('pointerup', () => isDragging = false);

        function renderViewer() {
            if(!document.getElementById('viewer').classList.contains('active') || isAutoSpinning) return;
            velocity *= (isDragging ? dragDamping : friction);
            if(Math.abs(velocity) < 0.01) velocity = 0;
            currentPos += velocity; updateImage();
            requestAnimationFrame(renderViewer);
        }
    </script>
</body>
</html>
