<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TOUCH ULTIMATE</title>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent-color: #e63928; --btn-gray: #b3b3b3; --border-color: #fff; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: sans-serif; overflow: hidden; -webkit-user-select: none; }
        
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; box-sizing: border-box; }
        .screen.active { display: flex; }

        /* HOME 画面 */
        #home h1 { font-size: 3.5rem; margin-top: 15vh; margin-bottom: 8vh; letter-spacing: 0.1em; }
        .home-btn { width: 80%; max-width: 400px; padding: 15px; margin: 8px 0; font-size: 1.2rem; border: none; cursor: pointer; font-weight: bold; }
        .btn-capture { background: var(--accent-color); color: #fff; }
        .btn-gray { background: var(--btn-gray); color: #fff; }

        /* 撮影エリア */
        #viewer-area { width: 90vw; height: 65vw; border: 4px solid #fff; margin-top: 10px; position: relative; overflow: hidden; background: #333; }
        #video, #onion-layer { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #guide-overlay { position: absolute; width: 100%; height: 100%; pointer-events: none; }

        /* ボタン・UI */
        .ui-row { display: flex; width: 90vw; justify-content: space-between; margin-top: 15px; gap: 10px; }
        .control-btn { border: 2px solid #fff; background: none; color: #fff; padding: 8px 0; flex: 1; font-size: 0.8rem; cursor: pointer; }
        .counter-box { flex: 1; text-align: center; line-height: 2; font-size: 0.9rem; }
        
        #shutter { width: 80px; height: 80px; border-radius: 50%; background: var(--accent-color); border: 4px solid #000; outline: 3px solid #fff; margin: 20px 0; cursor: pointer; }
        #shutter.timer-active { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .nav-row { display: flex; width: 90vw; justify-content: space-between; margin-top: auto; padding-bottom: 30px; }
        .nav-btn { border: 2px solid #fff; background: none; color: #fff; width: 31%; padding: 10px 0; font-size: 0.75rem; cursor: pointer; }

        /* ガイド線 */
        .line-h { position: absolute; width: 100%; height: 1px; background: rgba(255,255,255,0.5); }
        .line-v { position: absolute; height: 100%; width: 1px; background: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <h1>TOUCH</h1>
        <button class="home-btn btn-capture" onclick="nav('camera')">CAPTURE</button>
        <button class="home-btn btn-gray" onclick="document.getElementById('top-file-input').click()">IMPORT IMAGES</button>
        <input type="file" id="top-file-input" multiple accept="image/*" style="display:none" onchange="handleFileSelect(event)">
        <button class="home-btn btn-gray" onclick="nav('library')">LIBRARY</button>
    </div>

    <div id="camera" class="screen">
        <div id="viewer-area">
            <video id="video" autoplay playsinline muted></video>
            <img id="onion-layer" style="display:none; opacity: 0.4;">
            <div id="guide-overlay"></div>
        </div>

        <div class="ui-row">
            <button id="btn-guide" class="control-btn" onclick="toggleGuide()">GUIDE : off</button>
            <div id="counter" class="counter-box">[ 0 / 0 ]</div>
            <button id="btn-onion" class="control-btn" onclick="toggleOnion()">ONION : off</button>
        </div>

        <div class="ui-row" style="justify-content: flex-start;">
            <button id="btn-timer" class="control-btn" style="max-width: 120px;" onclick="toggleTimer()">TIMER : off</button>
        </div>

        <div id="shutter" onclick="onShutterClick()"></div>

        <div class="ui-row" style="justify-content: flex-start;">
            <button class="control-btn" style="max-width: 100px;" onclick="cancelLastFrame()">CANCEL</button>
        </div>

        <div class="nav-row">
            <button class="nav-btn" onclick="resetAndNav('home')">HOME</button>
            <button class="nav-btn" onclick="retakeAll()">RETAKE ALL</button>
            <button class="nav-btn" onclick="goPlayCheck()">PLAY CHECK</button>
        </div>
    </div>

    <canvas id="buffer" style="display:none;"></canvas>

    <script>
        let capturedImages = [], offsets = [], comments = [];
        let guideMode = 0, isOnion = false, timerInterval = null;

        // 画面遷移
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'camera') initCamera(); else stopCamera();
            if (timerInterval) stopTimer();
        }

        function resetAndNav(id) {
            if (capturedImages.length > 0 && !confirm("データを破棄して戻りますか？")) return;
            capturedImages = []; offsets = []; comments = [];
            nav(id);
        }

        // カメラ制御
        async function initCamera() {
            const v = document.getElementById('video');
            updateUI();
            if (v.srcObject) return;
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280, height: 720 } });
                v.srcObject = s;
            } catch (e) { alert("カメラを起動できませんでした。"); }
        }

        function stopCamera() {
            const v = document.getElementById('video');
            if (v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
        }

        // 撮影
        function captureFrame() {
            const v = document.getElementById('video');
            const b = document.getElementById('buffer');
            b.width = v.videoWidth; b.height = v.videoHeight;
            b.getContext('2d').drawImage(v, 0, 0);
            const data = b.toDataURL('image/jpeg', 0.8);
            capturedImages.push(data);
            offsets.push({ x: 0, y: 0 });
            comments.push([]); // コメント格納用
            updateUI();
        }

        function onShutterClick() {
            if (timerInterval) stopTimer(); else captureFrame();
        }

        // タイマー機能
        function toggleTimer() {
            if (timerInterval) { stopTimer(); return; }
            const sec = prompt("撮影間隔（秒）を入力してください", "2");
            if (sec && !isNaN(sec)) {
                startTimer(parseFloat(sec));
            }
        }

        function startTimer(sec) {
            timerInterval = setInterval(captureFrame, sec * 1000);
            document.getElementById('btn-timer').innerText = `TIMER : ${sec}s`;
            document.getElementById('shutter').classList.add('timer-active');
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            document.getElementById('btn-timer').innerText = `TIMER : off`;
            document.getElementById('shutter').classList.remove('timer-active');
        }

        // キャンセル
        function cancelLastFrame() {
            if (capturedImages.length > 0) {
                capturedImages.pop(); offsets.pop(); comments.pop();
                updateUI();
            }
        }

        // 全削除（リテイク）
        function retakeAll() {
            if (confirm("全ての撮影データを削除しますか？")) {
                capturedImages = []; offsets = []; comments = [];
                updateUI();
            }
        }

        // インポート（順番維持）
        async function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            capturedImages = []; offsets = []; comments = [];
            for (const file of files) {
                const data = await new Promise(res => {
                    const r = new FileReader(); r.onload = x => res(x.target.result); r.readAsDataURL(file);
                });
                capturedImages.push(data); offsets.push({ x: 0, y: 0 }); comments.push([]);
            }
            alert(`${capturedImages.length}枚読み込みました。PLAY CHECKへ移動します。`);
            nav('home'); // 本来はPLAY CHECKへ
        }

        // UI更新
        function updateUI() {
            const count = capturedImages.length;
            document.getElementById('counter').innerText = `[ ${count} / ${count} ]`;
            const onion = document.getElementById('onion-layer');
            if (isOnion && count > 0) {
                onion.src = capturedImages[count - 1];
                onion.style.display = 'block';
            } else { onion.style.display = 'none'; }
        }

        function toggleOnion() {
            isOnion = !isOnion;
            document.getElementById('btn-onion').innerText = `ONION : ${isOnion ? 'on' : 'off'}`;
            updateUI();
        }

        function toggleGuide() {
            guideMode = (guideMode + 1) % 3;
            const g = document.getElementById('guide-overlay');
            const b = document.getElementById('btn-guide');
            g.innerHTML = "";
            if (guideMode === 0) { b.innerText = "GUIDE : off"; }
            else if (guideMode === 1) {
                b.innerText = "GUIDE : 360";
                [25, 50, 75].forEach(p => { g.innerHTML += `<div class="line-h" style="top:${p}%"></div>`; });
            } else {
                b.innerText = "GUIDE : OBJ";
                [33, 66].forEach(p => { 
                    g.innerHTML += `<div class="line-h" style="top:${p}%"></div><div class="line-v" style="left:${p}%"></div>`; 
                });
            }
        }

        function goPlayCheck() {
            if (capturedImages.length === 0) return alert("まずは撮影してください。");
            alert("PLAY CHECKモードへ移動します（Phase 2で実装）");
        }
    </script>
</body>
</html>
