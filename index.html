<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TOUCH</title>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent-color: #ff3b30; --safe-color: #4cd964; --card-bg: #1c1c1e; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; overflow: hidden; -webkit-user-select: none; user-select: none; }
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }
        h1 { font-size: 4.5rem; font-weight: 900; letter-spacing: 0.2em; margin: 12vh 0 1rem 0.2em; }
        
        /* UI Components */
        .btn { background: #2c2c2e; color: #fff; padding: 18px; font-size: 1rem; border-radius: 14px; margin: 8px; cursor: pointer; width: 85%; max-width: 320px; text-align: center; border: none; }
        .btn-red { background: var(--accent-color) !important; font-weight: bold; }
        .mini-btn { background: #333; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 10px; font-size: 0.75rem; flex: 1; text-align: center; cursor: pointer; }
        .nav-row { display: flex; width: 92%; justify-content: space-around; margin-top: auto; padding-bottom: calc(20px + env(safe-area-inset-bottom)); gap: 10px; }
        
        /* Viewer Area */
        #camera-container, #viewer-area { width: 100vw; height: 60vh; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video, .viewer-layer, #onion-guide { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #current-layer { z-index: 10; touch-action: none; }
        #onion-layer { z-index: 5; opacity: 0.4; display: none; }
        
        /* Leveler & Grid */
        .grid { position: absolute; background: rgba(255,255,255,0.3); pointer-events: none; z-index: 15; }
        .grid.aligned { background: var(--safe-color); box-shadow: 0 0 8px var(--safe-color); }
        #leveler-dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; border: 2px solid #fff; z-index: 16; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* Library List */
        #lib-list { width: 92%; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px 0; }
        .lib-item { background: var(--card-bg); padding: 10px; border-radius: 14px; display: flex; align-items: center; gap: 10px; }
        .thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .item-info { flex: 1; overflow: hidden; }
        .item-title { font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <h1>TOUCH</h1>
        <button class="btn btn-red" onclick="nav('camera')">CAPTURE</button>
        <button class="btn" onclick="openLibrary()">LIBRARY</button>
        <div style="font-size: 0.7rem; color: #444; margin-top: auto; padding-bottom: 20px;">v1.0 Hybrid Edition</div>
    </div>

    <div id="camera" class="screen">
        <div id="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <img id="onion-guide" style="display:none; opacity:0.3;">
            <div id="grid-v1" class="grid" style="width:1px; height:100%; left:33%;"></div>
            <div id="grid-v2" class="grid" style="width:1px; height:100%; left:66%;"></div>
            <div id="grid-h1" class="grid" style="width:100%; height:1px; top:33%;"></div>
            <div id="grid-h2" class="grid" style="width:100%; height:1px; top:66%;"></div>
            <div id="leveler-dot"></div>
        </div>
        <div style="flex-grow:1; display:flex; flex-direction:column; align-items:center; width:100%; background:#000;">
            <div id="counter" style="color:#666; font-size:0.7rem; margin:10px 0;">0 FRAMES</div>
            <div id="shutter" style="width:60px; height:60px; border-radius:50%; background:#fff; border:4px solid #333;" onclick="captureFrame()"></div>
            <div class="nav-row" style="margin-top:20px;">
                <label class="mini-btn" style="background:#222;">IMPORT<input type="file" multiple accept="image/*" style="display:none;" onchange="importPhotos(this)"></label>
                <div id="mode-toggle" class="mini-btn btn-red" onclick="toggleCaptureMode()">OBJ (📦)</div>
                <div id="guide-btn" class="mini-btn" onclick="toggleOnionGuide()">GUIDE</div>
            </div>
            <div class="nav-row">
                <button class="mini-btn" style="padding:15px;" onclick="nav('home')">BACK</button>
                <button class="mini-btn btn-red" style="padding:15px;" onclick="startViewer(true)">DONE</button>
            </div>
        </div>
    </div>

    <div id="viewer" class="screen">
        <div id="viewer-area">
            <img id="onion-layer" class="viewer-layer">
            <img id="current-layer" class="viewer-layer">
        </div>
        <div style="flex-grow:1; display:flex; flex-direction:column; align-items:center; width:100%; background:#000; padding-top:10px;">
            <div id="preview-ui" style="width:90%; display:flex; flex-direction:column; gap:10px;">
                <div style="display:flex; gap:8px;">
                    <div id="btn-loop" class="mini-btn" style="flex:2; border:2px solid var(--accent-color);" onclick="toggleLoopPlay()">LOOP: OFF</div>
                    <div id="btn-speed" class="mini-btn" onclick="cycleSpeed()">×1.0</div>
                </div>
                <div style="display:flex; gap:8px;">
                    <div class="mini-btn" onclick="stepFrame(-1)">◀ STEP</div>
                    <div class="mini-btn" onclick="stepFrame(1)">STEP ▶</div>
                </div>
                <div style="display:flex; gap:8px;">
                    <div class="mini-btn" style="background:#222;" onclick="setMode('edit')">EDIT MODE (ALIGN)</div>
                    <div class="mini-btn" style="background:#222;" onclick="exportToGif()">🎬 MAKE GIF</div>
                </div>
            </div>

            <div id="edit-ui" style="width:90%; display:none; flex-direction:column; align-items:center; gap:10px;">
                <div id="frame-counter" style="font-family:monospace;">[0 / 0]</div>
                <div style="display:flex; gap:8px; width:100%;">
                    <div class="mini-btn" onclick="resetOffset()">RESET</div>
                    <div class="mini-btn" onclick="resetAllOffsets()">ALL RESET</div>
                    <div class="mini-btn" style="background:#444;" onclick="setMode('preview')">EXIT</div>
                </div>
            </div>

            <div class="nav-row" id="save-controls">
                <button class="mini-btn" onclick="nav('camera')">RETAKE</button>
                <button class="mini-btn btn-red" onclick="saveToLibrary(false)">SAVE</button>
            </div>
            <div class="nav-row" id="lib-nav-controls" style="display:none;">
                <button class="mini-btn" onclick="confirmAndExit('home')">HOME</button>
                <button class="mini-btn" onclick="confirmAndExit('library')">BACK</button>
            </div>
        </div>
    </div>

    <div id="library" class="screen">
        <div style="width:92%; display:flex; justify-content:space-between; align-items:center; margin-top:50px;">
            <h2 style="margin:0;">LIBRARY</h2>
            <label class="mini-btn" style="max-width:80px;">IMPORT<input type="file" accept=".touch" style="display:none;" onchange="importTouchData(this)"></label>
        </div>
        <div id="lib-list"></div>
        <div class="nav-row"><button class="btn" onclick="nav('home')" style="width:90%">HOME</button></div>
    </div>

    <canvas id="buffer" style="display:none;"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script> <script>
        let capturedImages = [], offsets = [], captureMode = 'obj', currentOpenId = null;
        let isDragging = false, isEditScreen = false, isAutoPlaying = false, isOnionEnabled = false;
        let hasUnsavedChanges = false, autoPlaySpeed = 1.0;
        let lastX = 0, lastY = 0, velocity = 0, currentPos = 0;
        let tiltX = 0, tiltY = 0, db;

        // DB & Init
        const request = indexedDB.open("TouchAppDB", 1);
        request.onupgradeneeded = e => { e.target.result.createObjectStore("photos", { keyPath: "id", autoIncrement: true }); };
        request.onsuccess = e => { db = e.target.result; };

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            isAutoPlaying = false; velocity = 0;
            if(id === 'camera') initCamera(); else stopCamera();
        }

        // Camera & Import Logic
        async function initCamera() {
            capturedImages = []; offsets = []; currentOpenId = null;
            document.getElementById('counter').innerText = `0 FRAMES`;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280, height: 1280 } });
                document.getElementById('video').srcObject = stream;
                window.addEventListener('deviceorientation', handleOrientation);
            } catch (e) { alert("Camera Error"); }
        }

        function stopCamera() {
            const v = document.getElementById('video');
            if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            window.removeEventListener('deviceorientation', handleOrientation);
        }

        function handleOrientation(e) {
            tiltX = e.gamma; tiltY = e.beta;
            const dot = document.getElementById('leveler-dot');
            const moveX = Math.max(-40, Math.min(40, tiltX));
            const moveY = Math.max(-40, Math.min(40, tiltY - 70));
            dot.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
            const isAligned = Math.abs(tiltX) < 3 && Math.abs(tiltY - 70) < 3;
            document.querySelectorAll('.grid').forEach(g => g.classList.toggle('aligned', isAligned));
        }

        function captureFrame() {
            const v = document.getElementById('video');
            const canvas = document.getElementById('buffer');
            canvas.width = 1280; canvas.height = 1280;
            canvas.getContext('2d').drawImage(v, 0, 0, 1280, 1280);
            const data = canvas.toDataURL('image/jpeg', 0.7);
            capturedImages.push(data);
            offsets.push({x:0, y:0});
            document.getElementById('counter').innerText = `${capturedImages.length} FRAMES`;
            if(isOnionEnabled) document.getElementById('onion-guide').src = data;
        }

        async function importPhotos(input) {
            const files = Array.from(input.files);
            for (let file of files) {
                const data = await readFileAsDataURL(file);
                const resized = await resizeImage(data);
                capturedImages.push(resized);
                offsets.push({x:0, y:0});
            }
            document.getElementById('counter').innerText = `${capturedImages.length} FRAMES`;
        }

        function resizeImage(data) {
            return new Promise(res => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('buffer');
                    canvas.width = 1280; canvas.height = 1280;
                    const ctx = canvas.getContext('2d');
                    const size = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0,0,1280,1280);
                    res(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = data;
            });
        }

        // Viewer Logic
        function startViewer(isNew) {
            if(capturedImages.length < 2) return;
            currentPos = 0; isAutoPlaying = false;
            setMode('preview');
            document.getElementById('save-controls').style.display = isNew ? 'flex' : 'none';
            document.getElementById('lib-nav-controls').style.display = isNew ? 'none' : 'flex';
            nav('viewer');
            renderLoop();
        }

        function setMode(mode) {
            isEditScreen = (mode === 'edit');
            isAutoPlaying = false;
            document.getElementById('btn-loop').innerText = "LOOP: OFF";
            document.getElementById('btn-loop').classList.remove('btn-red');
            document.getElementById('preview-ui').style.display = isEditScreen ? 'none' : 'flex';
            document.getElementById('edit-ui').style.display = isEditScreen ? 'flex' : 'none';
            document.getElementById('onion-layer').style.display = isEditScreen ? 'block' : 'none';
            updateImage();
        }

        function updateImage() {
            const total = capturedImages.length; if(!total) return;
            const idx = (Math.floor(currentPos) % total + total) % total;
            document.getElementById('current-layer').src = capturedImages[idx];
            document.getElementById('current-layer').style.transform = `translate(${offsets[idx].x}px, ${offsets[idx].y}px)`;
            if(isEditScreen) {
                const pIdx = (idx - 1 + total) % total;
                document.getElementById('onion-layer').src = capturedImages[pIdx];
                document.getElementById('onion-layer').style.transform = `translate(${offsets[pIdx].x}px, ${offsets[pIdx].y}px)`;
                document.getElementById('frame-counter').innerText = `[ ${idx + 1} / ${total} ]`;
            }
        }

        function toggleLoopPlay() {
            isAutoPlaying = !isAutoPlaying;
            const btn = document.getElementById('btn-loop');
            btn.innerText = isAutoPlaying ? "LOOP: ON" : "LOOP: OFF";
            btn.classList.toggle('btn-red', isAutoPlaying);
            if(isAutoPlaying) animate();
        }

        function animate() {
            if(!isAutoPlaying || isEditScreen) return;
            currentPos += (capturedImages.length / 180) * autoPlaySpeed;
            updateImage();
            requestAnimationFrame(animate);
        }

        function stepFrame(dir) { isAutoPlaying = false; currentPos = Math.round(currentPos) + dir; updateImage(); }
        function resetOffset() { const i = getIdx(); offsets[i] = {x:0, y:0}; hasUnsavedChanges = true; updateImage(); }
        function getIdx() { return (Math.floor(currentPos) % capturedImages.length + capturedImages.length) % capturedImages.length; }

        // Interaction
        const vArea = document.getElementById('viewer-area');
        vArea.onpointerdown = e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; velocity = 0; vArea.setPointerCapture(e.pointerId); };
        vArea.onpointermove = e => {
            if(!isDragging || isAutoPlaying) return;
            if(isEditScreen) { offsets[getIdx()].x += (e.clientX - lastX); offsets[getIdx()].y += (e.clientY - lastY); hasUnsavedChanges = true; updateImage(); }
            else { velocity = (e.clientX - lastX) / 10; currentPos += velocity; updateImage(); }
            lastX = e.clientX; lastY = e.clientY;
        };
        vArea.onpointerup = () => isDragging = false;

        function renderLoop() {
            if(document.getElementById('viewer').classList.contains('active') && !isAutoPlaying && !isDragging && Math.abs(velocity) > 0.01) {
                velocity *= 0.95; currentPos += velocity; updateImage();
            }
            requestAnimationFrame(renderLoop);
        }

        // Export/Import Files
        async function exportTouchData(id) {
            db.transaction(["photos"], "readonly").objectStore("photos").get(id).onsuccess = e => {
                const item = e.target.result;
                const blob = new Blob([JSON.stringify(item)], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `${item.title}.touch`; a.click();
            };
        }

        async function importTouchData(input) {
            const file = input.files[0]; if(!file) return;
            const text = await file.text();
            const item = JSON.parse(text);
            delete item.id; // 新規登録のためIDを削除
            const tx = db.transaction(["photos"], "readwrite");
            tx.objectStore("photos").add(item).onsuccess = () => openLibrary();
        }

        // SNS GIF Export
        function exportToGif() {
            alert("GIF生成を開始します。しばらくお待ちください...");
            const gif = new GIF({ workers: 2, quality: 10, width: 640, height: 640 });
            const canvas = document.getElementById('buffer');
            canvas.width = 640; canvas.height = 640;
            const ctx = canvas.getContext('2d');

            capturedImages.forEach((imgSrc, i) => {
                const img = new Image();
                img.src = imgSrc;
                // 同期的に描画するため少し工夫が必要ですが、ここでは簡易版
                ctx.fillStyle = "#000"; ctx.fillRect(0,0,640,640);
                // オフセットを考慮して描画
                ctx.drawImage(img, offsets[i].x/2, offsets[i].y/2, 640, 640);
                gif.addFrame(ctx, {copy: true, delay: 50});
            });

            gif.on('finished', blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = "touch_work.gif"; a.click();
                alert("GIFが保存されました！");
            });
            gif.render();
        }

        // Library UI
        function openLibrary() {
            const list = document.getElementById('lib-list'); list.innerHTML = "";
            db.transaction(["photos"], "readonly").objectStore("photos").openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) {
                    const item = cursor.value;
                    const div = document.createElement('div'); div.className = 'lib-item';
                    div.innerHTML = `<img src="${item.thumb}" class="thumb">
                        <div class="item-info"><span class="item-title">${item.title}</span></div>
                        <button class="mini-btn" onclick="viewItem(${item.id})">▶</button>
                        <button class="mini-btn" onclick="exportTouchData(${item.id})">📤</button>
                        <button class="mini-btn" style="color:#666;" onclick="deleteItem(${item.id})">🗑</button>`;
                    list.appendChild(div); cursor.continue();
                }
            };
            nav('library');
        }

        function saveToLibrary() {
            const title = prompt("作品名", new Date().toLocaleString());
            if(!title) return;
            const tx = db.transaction(["photos"], "readwrite");
            tx.objectStore("photos").add({ title, data: capturedImages, offsets, thumb: capturedImages[0], timestamp: Date.now() })
            .onsuccess = () => { hasUnsavedChanges = false; nav('home'); };
        }

        window.viewItem = id => {
            db.transaction(["photos"], "readonly").objectStore("photos").get(id).onsuccess = e => {
                const item = e.target.result; capturedImages = item.data; offsets = item.offsets;
                currentOpenId = id; startViewer(false);
            };
        };

        window.deleteItem = id => { if(confirm("削除しますか？")) db.transaction(["photos"], "readwrite").objectStore("photos").delete(id).onsuccess = () => openLibrary(); };
        function readFileAsDataURL(file) { return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); }); }
        function cycleSpeed() { autoPlaySpeed = autoPlaySpeed === 1.0 ? 2.0 : (autoPlaySpeed === 2.0 ? 0.5 : 1.0); document.getElementById('btn-speed').innerText = `×${autoPlaySpeed.toFixed(1)}`; }
    </script>
</body>
</html>
