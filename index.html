<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TOUCH FULL</title>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent-color: #ff3b30; --card-bg: #1c1c1e; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; overflow: hidden; -webkit-user-select: none; }
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }
        h1 { font-size: 4.5rem; font-weight: 900; letter-spacing: 0.2em; margin: 12vh 0 1rem 0.2em; }
        .btn { background: #2c2c2e; color: #fff; padding: 18px; font-size: 1rem; border-radius: 14px; margin: 8px; cursor: pointer; width: 85%; max-width: 320px; text-align: center; border: none; }
        .btn-red { background: var(--accent-color) !important; font-weight: bold; }
        .mini-btn { background: #333; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 10px; font-size: 0.75rem; flex: 1; text-align: center; }
        .nav-row { display: flex; width: 92%; justify-content: space-around; margin-top: auto; padding-bottom: calc(20px + env(safe-area-inset-bottom)); gap: 10px; }
        
        /* Viewer Area */
        #viewer-area { width: 100vw; height: 100vw; max-height: 60vh; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #view-canvas { width: 100%; height: 100%; object-fit: cover; }
        
        /* Capture Controls */
        #capture-controls { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; gap: 20px; }
        .shutter-row { display: flex; align-items: center; gap: 30px; }
        .side-icon { width: 44px; height: 44px; background: #2c2c2e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #fff; }
        #shutter { width: 70px; height: 70px; border-radius: 50%; background: #fff; border: 5px solid #333; box-shadow: 0 0 0 2px #fff; }

        #lib-list { width: 92%; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px 0; }
        .lib-item { background: var(--card-bg); padding: 10px; border-radius: 14px; display: flex; align-items: center; gap: 10px; }
        .thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <h1>TOUCH</h1>
        <button class="btn btn-red" onclick="nav('camera')">CAPTURE</button>
        <button class="btn" onclick="nav('library')">LIBRARY</button>
    </div>

    <div id="camera" class="screen">
        <div id="viewer-area"><video id="video" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video></div>
        <div id="capture-controls">
            <div id="counter" style="color:#666; font-size:0.8rem;">0 FRAMES</div>
            <div class="shutter-row">
                <div class="side-icon" onclick="document.getElementById('file-input').click()">＋</div>
                <div id="shutter" onclick="captureFrame()"></div>
                <div class="side-icon" style="visibility:hidden;"></div> </div>
            <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFileSelect(event)">
            <div class="nav-row"><button class="mini-btn" onclick="nav('home')">BACK</button><button class="mini-btn btn-red" onclick="startViewer(true)">DONE</button></div>
        </div>
    </div>

    <div id="viewer" class="screen">
        <div id="viewer-area"><canvas id="view-canvas"></canvas></div>
        <div style="flex-grow:1; display:flex; flex-direction:column; align-items:center; width:100%; padding-top:10px;">
            <div id="preview-ui" style="width:90%; display:flex; flex-direction:column; gap:10px;">
                <div style="display:flex; gap:8px;"><div id="btn-loop" class="mini-btn" onclick="toggleLoopPlay()">LOOP: OFF</div><div class="mini-btn" onclick="stepFrame(-1)">◀ STEP</div><div class="mini-btn" onclick="stepFrame(1)">STEP ▶</div></div>
                <div style="display:flex; gap:8px;"><div class="mini-btn" style="background:#222;" onclick="setMode('edit')">EDIT (ALIGN)</div><div class="mini-btn" style="background:var(--accent-color); font-weight:bold;" onclick="exportToVideo()">🎬 SAVE MP4</div></div>
            </div>
            <div id="edit-ui" style="width:90%; display:none; flex-direction:column; align-items:center; gap:10px;">
                <div id="frame-counter" style="font-family:monospace; color:var(--accent-color);">[0 / 0]</div>
                <div style="display:flex; gap:8px; width:100%;"><div class="mini-btn" onclick="resetOffset()">RESET</div><div class="mini-btn" style="background:#444;" onclick="setMode('preview')">EXIT</div></div>
            </div>
            <div class="nav-row" id="save-controls"><button class="mini-btn" onclick="nav('camera')">RETAKE</button><button class="mini-btn btn-red" onclick="saveToLibrary()">SAVE</button></div>
            <div class="nav-row" id="lib-nav-controls" style="display:none;"><button class="mini-btn" onclick="nav('home')">HOME</button><button class="mini-btn" onclick="nav('library')">BACK</button></div>
        </div>
    </div>

    <div id="library" class="screen">
        <div style="width:92%; margin-top:50px;"><h2>LIBRARY</h2></div>
        <div id="lib-list"></div>
        <div class="nav-row"><button class="btn" onclick="nav('home')" style="width:90%">HOME</button></div>
    </div>

    <div id="loading-overlay">
        <div style="font-size:1.2rem; font-weight:bold; color:#fff;">RECORDING MP4...</div>
    </div>

    <canvas id="buffer" style="display:none;"></canvas>

    <script>
        let capturedImages = [], offsets = [], db, imageElements = [];
        let isDragging = false, isEditScreen = false, isAutoPlaying = false;
        let currentPos = 0, lastX = 0, lastY = 0, velocity = 0;

        const request = indexedDB.open("TouchAppDB", 1);
        request.onupgradeneeded = e => { e.target.result.createObjectStore("photos", { keyPath: "id", autoIncrement: true }); };
        request.onsuccess = e => { db = e.target.result; };

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            isAutoPlaying = false; velocity = 0;
            document.getElementById(id).classList.add('active');
            if(id === 'camera') initCamera(); else stopCamera();
            if(id === 'library') renderLibraryList();
        }

        // --- 既存画像取り込みロジック ---
        async function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;
            files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

            for (let file of files) {
                const dataUrl = await new Promise(res => {
                    const reader = new FileReader();
                    reader.onload = e => res(e.target.result);
                    reader.readAsDataURL(file);
                });
                capturedImages.push(dataUrl);
                offsets.push({x:0, y:0});
            }
            document.getElementById('counter').innerText = `${capturedImages.length} FRAMES`;
            event.target.value = ""; // リセット
        }

        async function initCamera() {
            capturedImages = []; offsets = []; 
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1000, height: 1000 } });
                document.getElementById('video').srcObject = stream;
            } catch (e) { console.log("Camera access denied"); }
        }

        function stopCamera() {
            const v = document.getElementById('video');
            if(v && v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
        }

        function captureFrame() {
            const v = document.getElementById('video');
            const canvas = document.getElementById('buffer');
            canvas.width = 800; canvas.height = 800;
            canvas.getContext('2d').drawImage(v, 0, 0, 800, 800);
            capturedImages.push(canvas.toDataURL('image/jpeg', 0.8));
            offsets.push({x:0, y:0});
            document.getElementById('counter').innerText = `${capturedImages.length} FRAMES`;
        }

        async function startViewer(isNew) {
            if(capturedImages.length < 2) return;
            imageElements = await Promise.all(capturedImages.map(src => {
                return new Promise(res => { const img = new Image(); img.onload = () => res(img); img.src = src; });
            }));
            currentPos = 0; isAutoPlaying = false;
            setMode('preview');
            document.getElementById('save-controls').style.display = isNew ? 'flex' : 'none';
            document.getElementById('lib-nav-controls').style.display = isNew ? 'none' : 'flex';
            nav('viewer');
            renderLoop();
        }

        function setMode(mode) {
            isEditScreen = (mode === 'edit');
            document.getElementById('preview-ui').style.display = isEditScreen ? 'none' : 'flex';
            document.getElementById('edit-ui').style.display = isEditScreen ? 'flex' : 'none';
            draw();
        }

        function draw() {
            const canvas = document.getElementById('view-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 800; canvas.height = 800;
            const total = imageElements.length;
            const idx = (Math.floor(currentPos) % total + total) % total;
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,800,800);
            if(isEditScreen) {
                ctx.globalAlpha = 0.3;
                const pIdx = (idx - 1 + total) % total;
                ctx.drawImage(imageElements[pIdx], offsets[pIdx].x, offsets[pIdx].y, 800, 800);
                document.getElementById('frame-counter').innerText = `[ ${idx+1}/${total} ]`;
            }
            ctx.globalAlpha = 1.0;
            ctx.drawImage(imageElements[idx], offsets[idx].x, offsets[idx].y, 800, 800);
        }

        function toggleLoopPlay() {
            isAutoPlaying = !isAutoPlaying;
            document.getElementById('btn-loop').classList.toggle('btn-red', isAutoPlaying);
        }

        function stepFrame(dir) { isAutoPlaying = false; currentPos = Math.round(currentPos) + dir; draw(); }

        const vArea = document.getElementById('viewer-area');
        vArea.onpointerdown = e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; velocity = 0; vArea.setPointerCapture(e.pointerId); };
        vArea.onpointermove = e => {
            if(!isDragging || isAutoPlaying) return;
            const idx = (Math.floor(currentPos) % imageElements.length + imageElements.length) % imageElements.length;
            if(isEditScreen) { offsets[idx].x += (e.clientX - lastX) * 2; offsets[idx].y += (e.clientY - lastY) * 2; }
            else { velocity = (e.clientX - lastX) / 10; currentPos += velocity; }
            draw(); lastX = e.clientX; lastY = e.clientY;
        };
        vArea.onpointerup = () => isDragging = false;

        function renderLoop() {
            if(document.getElementById('viewer').classList.contains('active')) {
                if(isAutoPlaying && !isEditScreen) { currentPos += (imageElements.length / 120); draw(); }
                else if(!isDragging && Math.abs(velocity) > 0.01) { velocity *= 0.95; currentPos += velocity; draw(); }
            }
            requestAnimationFrame(renderLoop);
        }

        async function exportToVideo() {
            const canvas = document.getElementById('view-canvas');
            const stream = canvas.captureStream(30);
            let options = { mimeType: 'video/mp4' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm;codecs=h264' };
            const recorder = new MediaRecorder(stream, options);
            const chunks = [];
            document.getElementById('loading-overlay').style.display = 'flex';
            isAutoPlaying = true; currentPos = 0;
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `TOUCH_${Date.now()}.mp4`; a.click();
                document.getElementById('loading-overlay').style.display = 'none';
                isAutoPlaying = false;
            };
            recorder.start();
            setTimeout(() => { recorder.stop(); }, 4000); 
        }

        function saveToLibrary() {
            const title = prompt("Save as...", new Date().toLocaleString()); if(!title) return;
            const tx = db.transaction(["photos"], "readwrite");
            tx.objectStore("photos").add({ title, data: capturedImages, offsets, thumb: capturedImages[0], timestamp: Date.now() }).onsuccess = () => nav('home');
        }

        function renderLibraryList() {
            const list = document.getElementById('lib-list'); list.innerHTML = "";
            db.transaction(["photos"], "readonly").objectStore("photos").openCursor(null, 'prev').onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) {
                    const item = cursor.value;
                    const div = document.createElement('div'); div.className = 'lib-item';
                    div.innerHTML = `<img src="${item.thumb}" class="thumb"><div class="item-info"><b>${item.title}</b></div>
                        <button class="mini-btn" onclick="viewItem(${item.id})">▶</button>
                        <button class="mini-btn" style="color:#666;" onclick="deleteItem(${item.id})">🗑</button>`;
                    list.appendChild(div); cursor.continue();
                }
            };
        }

        window.viewItem = id => { db.transaction(["photos"], "readonly").objectStore("photos").get(id).onsuccess = e => { const item = e.target.result; capturedImages = item.data; offsets = item.offsets; startViewer(false); }; };
        window.deleteItem = id => { if(confirm("Delete?")) db.transaction(["photos"], "readwrite").objectStore("photos").delete(id).onsuccess = () => renderLibraryList(); };
        function resetOffset() { const idx = (Math.floor(currentPos) % imageElements.length + imageElements.length) % imageElements.length; offsets[idx] = {x:0, y:0}; draw(); }
    </script>
</body>
</html>
