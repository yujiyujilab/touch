<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TOUCH - Phase 2 Integrated</title>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent-color: #e63928; --btn-gray: #b3b3b3; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: sans-serif; overflow: hidden; -webkit-user-select: none; }
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; box-sizing: border-box; }
        .screen.active { display: flex; }

        /* UI汎用 */
        .viewer-container { width: 100vw; height: 75vw; border-top: 2px solid #fff; border-bottom: 2px solid #fff; margin-top: 10px; position: relative; overflow: hidden; background: #000; }
        #video, #onion-layer, #play-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        .ui-row { display: flex; width: 90vw; justify-content: space-between; margin-top: 12px; gap: 8px; flex-wrap: wrap; }
        .control-btn { border: 2px solid #fff; background: rgba(0,0,0,0.5); color: #fff; padding: 10px 5px; flex: 1; font-size: 0.75rem; cursor: pointer; min-width: 80px; }
        .counter-box { flex: 1; text-align: center; line-height: 2.5; font-size: 1rem; font-weight: bold; min-width: 80px; }
        
        /* 撮影ボタン */
        #shutter { width: 85px; height: 85px; border-radius: 50%; background: var(--accent-color); border: 4px solid #000; outline: 3px solid #fff; margin: 15px 0; cursor: pointer; }
        .timer-running { animation: pulse 1s infinite; background: #fff !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); background: var(--accent-color) !important; } 100% { transform: scale(1); } }

        /* ナビゲーション */
        .nav-row { display: flex; width: 95vw; justify-content: space-between; margin-top: auto; padding-bottom: 25px; }
        .nav-btn { border: 2px solid #fff; background: none; color: #fff; width: 48%; padding: 12px 0; font-size: 0.8rem; cursor: pointer; font-weight: bold; }

        /* モーダル */
        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #333; padding: 25px; border-radius: 12px; text-align: center; width: 80%; max-width: 300px; border: 2px solid #fff; }
        .m-btn { padding: 10px 20px; border: none; margin: 10px; cursor: pointer; font-weight: bold; }

        #shutter-curtain { position: absolute; width: 100%; height: 100%; background: #000; opacity: 0; pointer-events: none; z-index: 20; }
        .flash { animation: flash-effect 0.1s ease-out; }
        @keyframes flash-effect { 0% { opacity: 0.9; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <h1 style="font-size: 3.5rem; margin-top: 15vh;">TOUCH</h1>
        <button class="home-btn btn-capture" style="background:var(--accent-color); color:#fff; width:80%; padding:15px; margin:10px; font-weight:bold; border-radius:8px;" onclick="navToCamera()">CAPTURE</button>
        <button class="home-btn" style="background:var(--btn-gray); color:#fff; width:80%; padding:15px; margin:10px; font-weight:bold; border-radius:8px;" onclick="nav('library')">LIBRARY</button>
    </div>

    <div id="camera" class="screen">
        <div class="viewer-container">
            <video id="video" autoplay playsinline muted></video>
            <img id="onion-layer" style="display:none; opacity: 0.4;">
            <div id="shutter-curtain"></div>
        </div>
        <div class="ui-row">
            <button class="control-btn" onclick="cycleTimerSetting()" id="btn-timer">TIMER : off</button>
            <div id="cap-counter" class="counter-box">[ 0 / 0 ]</div>
            <button class="control-btn" onclick="toggleOnion()" id="btn-onion">ONION : off</button>
        </div>
        <div id="shutter" onclick="handleShutter()"></div>
        <div class="ui-row"><button class="control-btn" style="max-width:100px;" onclick="cancelLastFrame()">CANCEL</button></div>
        <div class="nav-row">
            <button class="nav-btn" onclick="showModal('EXIT')">HOME</button>
            <button class="nav-btn" onclick="goPlayCheck()">PLAY CHECK</button>
        </div>
    </div>

    <div id="playcheck" class="screen">
        <div class="viewer-container" id="swipe-area">
            <canvas id="play-canvas"></canvas>
        </div>
        <div class="ui-row">
            <button class="control-btn" onclick="stepFrame(-1)">◀ STEP</button>
            <div id="play-counter" class="counter-box">[ 1 / 16 ]</div>
            <button class="control-btn" onclick="stepFrame(1)">STEP ▶</button>
        </div>
        <div class="ui-row">
            <button class="control-btn" id="btn-loop" onclick="cycleLoopSpeed()">LOOP : off</button>
        </div>
        <div class="ui-row">
            <button class="control-btn" onclick="deleteCurrentFrame()">DELETE THIS FRAME</button>
            <button class="control-btn" onclick="addAfterThis()">ADD after THIS FLAME</button>
        </div>
        <div class="ui-row">
            <button class="control-btn" onclick="nav('pos-edit')">POS EDIT</button>
        </div>
        <div class="nav-row">
            <button class="nav-btn" onclick="showModal('EXIT')">HOME (QUIT)</button>
            <button class="nav-btn" onclick="saveToLibrary()">SAVE to LIBRARY</button>
        </div>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <p id="modal-msg"></p>
            <button class="m-btn" style="background:var(--accent-color); color:#fff;" onclick="modalYes()">YES</button>
            <button class="m-btn" style="background:var(--btn-gray); color:#fff;" onclick="modalNo()">NO</button>
        </div>
    </div>

    <canvas id="buffer" style="display:none;"></canvas>

    <script>
        let capturedImages = [];
        let stream = null;
        let currentIndex = 0;
        
        // Timer & Loop
        let timerSec = 0, timerInterval = null, isTimerRunning = false;
        let loopSpeed = 0; // 0, 1, 2, 4
        let loopInterval = null;

        // Swipe
        let startX = 0;

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'playcheck') initPlayMode();
            if (id === 'camera') startCamera(); else stopLoop();
        }

        /* --- CAPTURE LOGIC --- */
        async function navToCamera() { nav('camera'); }
        
        async function startCamera() {
            const v = document.getElementById('video');
            if (stream) return;
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            v.srcObject = stream;
        }

        function handleShutter() {
            if (timerSec === 0) captureFrame();
            else {
                if (!isTimerRunning) {
                    isTimerRunning = true;
                    document.getElementById('shutter').classList.add('timer-running');
                    captureFrame();
                    timerInterval = setInterval(captureFrame, timerSec * 1000);
                } else stopTimer();
            }
        }

        function stopTimer() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            document.getElementById('shutter').classList.remove('timer-running');
        }

        function captureFrame() {
            const v = document.getElementById('video');
            const b = document.getElementById('buffer');
            const curtain = document.getElementById('shutter-curtain');
            curtain.classList.add('flash'); setTimeout(() => curtain.classList.remove('flash'), 100);

            b.width = v.videoWidth; b.height = v.videoHeight;
            b.getContext('2d').drawImage(v, 0, 0);
            const data = b.toDataURL('image/jpeg', 0.8);

            // 挿入モード（ADD after THIS）対応
            if (insertIndex !== null) {
                capturedImages.splice(insertIndex + 1, 0, data);
                insertIndex++;
            } else {
                capturedImages.push(data);
            }
            updateCaptureUI();
        }

        let insertIndex = null;
        function addAfterThis() {
            insertIndex = currentIndex;
            nav('camera');
        }

        function updateCaptureUI() {
            document.getElementById('cap-counter').innerText = `[ ${capturedImages.length} / ${capturedImages.length} ]`;
            if (capturedImages.length > 0 && isOnion) {
                const onion = document.getElementById('onion-layer');
                onion.src = capturedImages[capturedImages.length-1];
                onion.style.display = 'block';
            }
        }

        /* --- PLAY CHECK LOGIC --- */
        function initPlayMode() {
            insertIndex = null;
            currentIndex = capturedImages.length - 1;
            drawFrame();
            setupSwipe();
        }

        function drawFrame() {
            if (capturedImages.length === 0) return;
            const canvas = document.getElementById('play-canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            };
            img.src = capturedImages[currentIndex];
            document.getElementById('play-counter').innerText = `[ ${currentIndex + 1} / ${capturedImages.length} ]`;
        }

        function stepFrame(dir) {
            stopLoop();
            currentIndex = (currentIndex + dir + capturedImages.length) % capturedImages.length;
            drawFrame();
        }

        function setupSwipe() {
            const area = document.getElementById('swipe-area');
            area.ontouchstart = (e) => { startX = e.touches[0].clientX; stopLoop(); };
            area.ontouchmove = (e) => {
                const diff = e.touches[0].clientX - startX;
                if (Math.abs(diff) > 20) {
                    currentIndex = (currentIndex + (diff > 0 ? -1 : 1) + capturedImages.length) % capturedImages.length;
                    drawFrame();
                    startX = e.touches[0].clientX;
                }
            };
        }

        function cycleLoopSpeed() {
            const speeds = [0, 1, 2, 4];
            loopSpeed = speeds[(speeds.indexOf(loopSpeed) + 1) % speeds.length];
            document.getElementById('btn-loop').innerText = `LOOP : ${loopSpeed === 0 ? 'off' : 'x' + loopSpeed}`;
            stopLoop();
            if (loopSpeed > 0) {
                loopInterval = setInterval(() => {
                    currentIndex = (currentIndex + 1) % capturedImages.length;
                    drawFrame();
                }, 1000 / (loopSpeed * 5)); // 基本5fpsベース
            }
        }

        function stopLoop() {
            clearInterval(loopInterval);
            loopInterval = null;
        }

        function deleteCurrentFrame() {
            if (capturedImages.length <= 1) return alert("これ以上削除できません。");
            capturedImages.splice(currentIndex, 1);
            currentIndex = Math.min(currentIndex, capturedImages.length - 1);
            drawFrame();
        }

        function saveToLibrary() {
            const name = prompt("保存する名前を入力してください", "nomi");
            if (name) {
                alert(name + " を保存しました。");
                nav('home');
            }
        }

        /* --- SYSTEM --- */
        let modalAction = "";
        function showModal(type) {
            modalAction = type;
            document.getElementById('modal-msg').innerText = "データを破棄して戻りますか？";
            document.getElementById('custom-modal').style.display = 'flex';
        }
        function modalNo() { document.getElementById('custom-modal').style.display = 'none'; }
        function modalYes() {
            document.getElementById('custom-modal').style.display = 'none';
            capturedImages = [];
            nav('home');
        }

        // その他トグル
        let isOnion = false;
        function toggleOnion() {
            isOnion = !isOnion;
            document.getElementById('btn-onion').innerText = `ONION : ${isOnion ? 'on' : 'off'}`;
            if (!isOnion) document.getElementById('onion-layer').style.display = 'none';
        }
        function cycleTimerSetting() {
            const t = [0, 2, 5, 10];
            timerSec = t[(t.indexOf(timerSec) + 1) % t.length];
            document.getElementById('btn-timer').innerText = `TIMER : ${timerSec === 0 ? 'off' : timerSec + 's'}`;
        }
        function goPlayCheck() {
            if (capturedImages.length === 0) return alert("撮影データがありません。");
            nav('playcheck');
        }
    </script>
</body>
</html>
