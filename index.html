<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TOUCH</title>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent-color: #ff3b30; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; overflow: hidden; -webkit-user-select: none; user-select: none; }
        .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; }
        .screen.active { display: flex; }
        h1 { font-size: 4.5rem; font-weight: 900; letter-spacing: 0.2em; margin: 0 0 2rem 0.2em; }
        .btn { background: #1c1c1e; color: #fff; border: 1px solid #3a3a3c; padding: 20px; font-size: 1.1rem; border-radius: 14px; margin: 10px; cursor: pointer; width: 85%; max-width: 320px; text-align: center; -webkit-tap-highlight-color: transparent; }
        .btn-accent { background: var(--accent-color); border: none; font-weight: bold; }
        .btn:active { background: #3a3a3c; transform: scale(0.98); }
        #camera-container { width: 100%; height: 75%; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; }
        .guide { position: absolute; background: rgba(255,255,255,0.4); pointer-events: none; }
        .v-line { width: 1px; height: 100%; left: 50%; }
        .h-line { width: 100%; height: 1px; top: 50%; left: 0; }
        .controls { width: 100%; height: 25%; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; background: #000; padding-bottom: env(safe-area-inset-bottom); }
        #shutter { width: 72px; height: 72px; border-radius: 50%; background: #fff; border: 5px solid #333; }
        .nav-row { display: flex; width: 90%; justify-content: space-between; }
        .nav-row .btn { width: 46%; margin: 0; padding: 12px; font-size: 0.9rem; }
        #viewer-area { width: 100%; height: 75%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; touch-action: none; overflow: hidden; }
        #viewer-img { max-width: 100%; max-height: 100%; pointer-events: none; }
        #lib-list { width: 90%; height: 70%; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .lib-item { background: #1c1c1e; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <h1>TOUCH</h1>
        <button class="btn btn-accent" onclick="nav('camera')">CAPTURE</button>
        <button class="btn" onclick="openLibrary()">LIBRARY</button>
    </div>

    <div id="camera" class="screen">
        <div id="camera-container">
            <video id="video" autoplay playsinline></video>
            <div class="guide v-line"></div>
            <div class="guide h-line"></div>
        </div>
        <div class="controls">
            <div id="counter" style="color:#666; font-size:0.8rem;">0 FRAMES</div>
            <div id="shutter" onclick="captureFrame()"></div>
            <div class="nav-row">
                <button class="btn" onclick="nav('home')">CANCEL</button>
                <button class="btn btn-accent" onclick="startViewer(true)">DONE</button>
            </div>
        </div>
        <canvas id="buffer"></canvas>
    </div>

    <div id="viewer" class="screen">
        <div id="viewer-area"><img id="viewer-img"></div>
        <div class="controls">
            <div id="viewer-msg" style="color:#888; font-size:0.8rem;">PREVIEWING...</div>
            <div class="nav-row" id="preview-controls">
                <button class="btn" onclick="nav('camera')">RETAKE</button>
                <button class="btn btn-accent" onclick="saveToLibrary()">SAVE</button>
            </div>
            <div class="nav-row" id="library-controls" style="display:none;">
                <button class="btn" onclick="nav('home')">HOME</button>
                <button class="btn btn-accent" onclick="openLibrary()">BACK</button>
            </div>
        </div>
    </div>

    <div id="library" class="screen">
        <h2 style="margin-top: 40px;">LIBRARY</h2>
        <div id="lib-list"></div>
        <button class="btn" onclick="nav('home')" style="margin-bottom: 40px;">HOME</button>
    </div>

    <script>
        let capturedImages = [];
        let isDragging = false, lastX = 0, velocity = 0, currentPos = 0;
        let isAutoSpinning = false; // 自動再生中フラグ
        const friction = 0.92, dragDamping = 0.4;

        let db;
        const request = indexedDB.open("TouchAppDB", 1);
        request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("photos", { keyPath: "id", autoIncrement: true }); };
        request.onsuccess = e => db = e.target.result;

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'camera') initCamera(); else stopCamera();
            if(id === 'home') capturedImages = [];
            isAutoSpinning = false;
        }

        async function initCamera() {
            capturedImages = [];
            document.getElementById('counter').innerText = "0 FRAMES";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280, height: 1280 } });
                document.getElementById('video').srcObject = stream;
            } catch (e) { alert("カメラにアクセスできません"); }
        }

        function stopCamera() {
            const video = document.getElementById('video');
            if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        }

        function captureFrame() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('buffer');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImages.push(canvas.toDataURL('image/jpeg', 0.6));
            document.getElementById('counter').innerText = `${capturedImages.length} FRAMES`;
        }

        function startViewer(isPreview) {
            if(capturedImages.length < 2) return alert("2枚以上撮影してください");
            document.getElementById('viewer-img').src = capturedImages[0];
            document.getElementById('preview-controls').style.display = isPreview ? 'flex' : 'none';
            document.getElementById('library-controls').style.display = isPreview ? 'none' : 'flex';
            nav('viewer');
            
            if(isPreview) {
                runAutoSpin(); // プレビュー時のみ自動再生
            } else {
                document.getElementById('viewer-msg').innerText = "SWIPE TO ROTATE";
                renderViewer();
            }
        }

        function runAutoSpin() {
            isAutoSpinning = true;
            document.getElementById('viewer-msg').innerText = "CHECKING...";
            currentPos = 0;
            velocity = 0;
            
            let startTime = null;
            const duration = 2000; // 2秒間で回す
            const spins = 2; // 2回転させる

            function animate(timestamp) {
                if(!startTime) startTime = timestamp;
                let progress = (timestamp - startTime) / duration;

                if (progress < 1 && isAutoSpinning) {
                    currentPos = progress * (capturedImages.length * spins);
                    updateImage();
                    requestAnimationFrame(animate);
                } else {
                    isAutoSpinning = false;
                    document.getElementById('viewer-msg').innerText = "SWIPE TO ROTATE";
                    renderViewer(); // 通常のレンダリング（操作可能）に移行
                }
            }
            requestAnimationFrame(animate);
        }

        function updateImage() {
            const total = capturedImages.length;
            if(total > 0) {
                const idx = (Math.floor(currentPos) % total + total) % total;
                document.getElementById('viewer-img').src = capturedImages[idx];
            }
        }

        function saveToLibrary() {
            const title = prompt("名前をつけて保存", new Date().toLocaleString());
            if(!title) return;
            const transaction = db.transaction(["photos"], "readwrite");
            transaction.objectStore("photos").add({ title: title, data: capturedImages });
            transaction.oncomplete = () => { alert("保存しました"); nav('home'); };
        }

        async function openLibrary() {
            const list = document.getElementById('lib-list'); list.innerHTML = "";
            const transaction = db.transaction(["photos"], "readonly");
            transaction.objectStore("photos").openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) {
                    const div = document.createElement('div'); div.className = 'lib-item';
                    div.innerHTML = `<span>${cursor.value.title}</span>`;
                    const btn = document.createElement('button'); btn.innerText = "VIEW"; btn.className = "btn";
                    btn.style.width = "80px"; btn.style.padding = "10px"; btn.style.margin = "0";
                    btn.onclick = (val => () => { capturedImages = val; startViewer(false); })(cursor.value.data);
                    div.appendChild(btn);
                    list.appendChild(div);
                    cursor.continue();
                }
            };
            nav('library');
        }

        const vArea = document.getElementById('viewer-area');
        vArea.addEventListener('pointerdown', e => { 
            if(isAutoSpinning) return; // 再生中は操作不可
            isDragging = true; lastX = e.clientX; velocity = 0; vArea.setPointerCapture(e.pointerId); 
        });
        vArea.addEventListener('pointermove', e => {
            if(!isDragging || isAutoSpinning) return;
            const dx = e.clientX - lastX;
            velocity += (dx / window.innerWidth) * (capturedImages.length * 2.0); // 係数 2.0
            lastX = e.clientX;
        });
        vArea.addEventListener('pointerup', () => isDragging = false);

        function renderViewer() {
            if(document.getElementById('viewer').classList.contains('active') && !isAutoSpinning) {
                velocity *= (isDragging ? dragDamping : friction);
                if(Math.abs(velocity) < 0.01) velocity = 0;
                currentPos += velocity;
                updateImage();
                requestAnimationFrame(renderViewer);
            }
        }
    </script>
</body>
</html>
